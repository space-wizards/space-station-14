- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceKnightPerson
  categories: [ HideSpawnMenu ]
  name: knightrson appearance
  components:
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: InitialBody
    organs:
      Torso: OrganKnightPersonTorso
      Head: OrganKnightPersonHead
      ArmLeft: OrganKnightPersonArmLeft
      ArmRight: OrganKnightPersonArmRight
      HandRight: OrganKnightPersonHandRight
      HandLeft: OrganKnightPersonHandLeft
      LegLeft: OrganKnightPersonLegLeft
      LegRight: OrganKnightPersonLegRight
      FootLeft: OrganKnightPersonFootLeft
      FootRight: OrganKnightPersonFootRight
  - type: HumanoidProfile
    species: Knight

- type: entity
  parent:
  - AppearanceKnightPerson
  - BaseSpeciesMob
  id: MobKnightPerson
  name: Urist McKnight
  components:
  - type: Damageable
    damageModifierSet: Knight
  - type: Injurable
    damageContainer: BiologicalMetaphysical
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#555555AA"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: MobThresholds
    thresholds:
      0: Alive
      150: Critical
      200: Dead
  - type: TransferMindOnGib
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:GibBehavior
  - type: SlowOnDamage
    speedModifierThresholds:
      60: 0.9
      80: 0.7
  - type: Speech
    speechVerb: Knight
    allowedEmotes: [Pray]
  - type: ZombieImmune
  - type: Vocal
    sounds:
      Male: Knight
      Female: Knight
      Unsexed: Knight
  - type: KnightAccent
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 130
        restitution: 0.0
        mask:
          - MobMask
        layer:
          - MobLayer
  - type: Reactive
    groups:
      Flammable: [ Touch ]
      Extinguish: [ Touch ]
    reactions:
    - reagents: [ Water, SpaceCleaner ]
      methods: [ Touch ]
      effects:
      - !type:WashCreamPie
    - reagents: [ Holywater ]
      methods: [ Touch ]
      effects:
      - !type:EvenHealthChange
        damage:
          Burn: -1
          Brute: -0.75
          Metaphysical: -2
      - !type:PopupMessage
        type: Local
        visualType: Large
        messages: [ "knight-healed-by-holywater-popup" ]
        probability: 0.25
  - type: FireVisuals
    alternateState: Standing
  - type: FlashImmunity
    showInExamine: false
  # Needed so internals / metabolism logic works, but skeletons don't actually need air.
  - type: Instrument
    program: 13 # Xylophone. Woodblock is 115 (another good option)
  - type: ActivatableUI
    blockSpectators: true # otherwise they can play client-side music
    inHandsOnly: false
    singleUser: true
    requiresComplex: true
    verbOnly: true
    verbText: verb-instrument-openui
    key: enum.InstrumentUiKey.Key
  - type: UserInterface
    interfaces:
      enum.InstrumentUiKey.Key:
        type: InstrumentBoundUserInterface
      enum.HumanoidMarkingModifierKey.Key:
        type: HumanoidMarkingModifierBoundUserInterface
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
  - type: InteractionPopup
    successChance: 1
    interactSuccessString: hugging-success-generic
    interactSuccessSound: /Audio/Effects/thudswoosh.ogg
    messagePerceivedByOthers: hugging-success-generic-others

