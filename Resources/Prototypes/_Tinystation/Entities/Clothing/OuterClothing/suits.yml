- type: entity
  parent: [ClothingOuterBaseLarge, AllowSuitStorageClothing]
  id: ClothingOuterSuitKnight
  name: knight's carapace
  description: Heavy reinforced armor suit blessed with holy resilience. Protects the righteous in battle.
  components:
  - type: Sprite
    sprite: _Tinystation/Clothing/OuterClothing/Sutis/knight_suit.rsi
  - type: Clothing
    sprite: _Tinystation/Clothing/OuterClothing/Sutis/knight_suit.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.02
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
    heatingCoefficient: 0.001
    coolingCoefficient: 0.05
  - type: FireProtection
    reduction: 0.8
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.5
        Slash: 0.4
        Piercing: 0.5
        Heat: 0.5
        Cold: 0.5
        Caustic: 0.9
  - type: ExplosionResistance
    damageCoefficient: 0.5
    worn: true
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.85
  - type: HeldSpeedModifier
  - type: GroupExamine
  - type: ProtectedFromStepTriggers
    slots: WITHOUT_POCKET
  - type: Tag
    tags:
    - WhitelistChameleon
  - type: HideLayerClothing
    slots:
    - Tail
