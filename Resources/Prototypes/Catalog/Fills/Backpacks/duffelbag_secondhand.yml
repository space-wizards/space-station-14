# Second-hand (incomplete) kit variants for the Second Hand uplink tab.
# Uses EntityTableContainerFill with per-item Prob values to randomise which
# items are present each time the entity is spawned. Core items are always
# included; accessories and high-value items spawn probabilistically.

# Incomplete Chameleon Kit
# - Jumpsuit and outer coat: always present (kit is useless without them)
# - Accessories (neck, mask, hat, gloves, eyes, headset, shoes): 65% each
# - Agent PDA: 50%
# - Controller implanter: 35%
- type: entity
  parent: ClothingBackpackChameleon
  id: ClothingBackpackChameleonFillAgentWorn
  suffix: Fill, Second Hand
  name: worn chameleon kit
  description: A chameleon kit that's been through a few too many hands. The suit and coat are intact — accessories, PDA, and implanter may or may not have made it into the bag. Check the contents before trusting your cover.
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: ClothingUniformJumpsuitChameleon   # always
        - id: ClothingOuterChameleon             # always
        - id: ClothingNeckChameleon
          prob: 0.65
        - id: ClothingMaskGasChameleon
          prob: 0.65
        - id: ClothingHeadHatChameleon
          prob: 0.65
        - id: ClothingHandsChameleon
          prob: 0.65
        - id: ClothingEyesChameleon
          prob: 0.65
        - id: ClothingHeadsetChameleon
          prob: 0.65
        - id: ClothingShoesChameleon
          prob: 0.65
        - id: ChameleonAgentPDA
          prob: 0.5
        - id: ChameleonControllerImplanter
          prob: 0.35
