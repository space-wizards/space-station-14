- type: entity
  parent: BaseAction
  id: ActionPlasmamanDash
  name: Plasma Dash
  description: Vent plasma from your body to launch yourself a short distance forward. Only works in space - range scales with your breath saturation, and costs some of it.
  components:
  - type: Action
    useDelay: 15
    icon:
      sprite: Interface/Actions/jump.rsi
      state: icon
  - type: InstantAction
    event: !type:PlasmamanDashEvent {}
