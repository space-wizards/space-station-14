- type: entity
  parent:
  - AppearancePlasmaman
  - BaseSpeciesMobOrganic
  id: MobPlasmaman
  name: Urist McPlasma
  components:
  - type: Damageable
    damageModifierSet: Plasmaman
  - type: PlasmamanOxygenIgnition
    gas: Oxygen
    molesToIgnite: 0.5
    fireStacksPerUpdate: 0.33
  - type: Barotrauma
    damage:
      types:
        Blunt: 0
        Heat: 0
  - type: PlasmamanDash
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#555555AA"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: Bloodstream
    bloodlossThreshold: 0
    bleedReductionAmount: 0
    maxBleedAmount: 0
    bloodlossDamage:
      types:
        Bloodloss: 0
    bloodlossHealDamage:
      types:
        Bloodloss: 0
    bloodRefreshAmount: 0
    bloodReferenceSolution:
      reagents:
      - ReagentId: Plasma
        Quantity: 600
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: SheetPlasma1
      amount: 8
  - type: Temperature
    currentTemperature: 270.15
    specificHeat: 46
    atmosTemperatureTransferEfficiency: 0.02
  - type: TemperatureSpeed
    thresholds:
      1: 1.0
  - type: TemperatureDamage
    heatDamageThreshold: 308
    coldDamageThreshold: 0
    coldDamage:
      types:
        Cold: 0
    heatDamage:
      types:
        Heat: 3
  - type: ThermalRegulator
    metabolismHeat: 800
    radiatedHeat: 100
    implicitHeatRegulation: 250
    sweatHeatRegulation: 500
    shiveringHeatRegulation: 500
    normalBodyTemperature: 270.15
    thermalRegulationTemperatureThreshold: 2
  - type: Speech
    speechSounds: Alto
    speechVerb: Skeleton

