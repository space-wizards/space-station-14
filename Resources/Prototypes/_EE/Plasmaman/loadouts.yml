- type: loadoutEffectGroup
  id: PlasmamanBreather
  effects:
  - !type:SpeciesLoadoutEffect
    species:
    - Plasmaman

# Critical enviro gear is granted by PlasmamanStartingGearSystem on every spawn.
# Loadouts only add the optional survival box variant for the species so they
# don't collide with the system-provided envirosuit/helm/gloves/mask/tank.

- type: loadout
  id: LoadoutSpeciesPlasmamanGear
  effects:
  - !type:GroupLoadoutEffect
    proto: PlasmamanBreather
  storage:
    back:
    - BoxSurvival

- type: loadout
  id: LoadoutSpeciesPlasmamanCriticalGear
  effects:
  - !type:GroupLoadoutEffect
    proto: PlasmamanBreather

- type: loadout
  id: LoadoutSpeciesPlasmamanGearClown
  effects:
