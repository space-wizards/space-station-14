# Optional explicit picks (do duplicate equipment by design):
# - LoadoutSpeciesEVAPlasma: extra plasma tank in suitstorage.
# - LoadoutSpeciesPocketDoublePlasma: extra plasma tank in pocket1.
- type: loadout
  id: LoadoutSpeciesEVAPlasma
  effects:
  - !type:GroupLoadoutEffect
    proto: PlasmamanBreather
  equipment:
    suitstorage: PlasmaTankFilled

- type: loadout
  id: LoadoutSpeciesPocketDoublePlasma
  effects:
  - !type:GroupLoadoutEffect
    proto: PlasmamanBreather
  equipment:
    pocket1: DoubleEmergencyPlasmaTankFilled
