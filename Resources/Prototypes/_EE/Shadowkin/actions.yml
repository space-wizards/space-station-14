- type: entity
  parent: BaseAction
  id: ActionShadowkinPlaceAnchor
  name: Place Shadow Anchor
  description: Leave a shadow at this spot. You can teleport back to it later.
  components:
  - type: Action
    icon:
      sprite: _EE/Shadowkin/Interface/Actions/shadowkin_icons.rsi
      state: shadeskip
    useDelay: 60
  - type: InstantAction
    event: !type:PlaceShadowAnchorEvent

- type: entity
  parent: BaseAction
  id: ActionShadowkinRecall
  name: Recall
  description: Instantly teleport to your shadow.
  components:
  - type: Action
    icon:
      sprite: _EE/Shadowkin/Interface/Actions/shadowkin_icons.rsi
      state: darkswap
  - type: InstantAction
    event: !type:RecallShadowAnchorEvent
