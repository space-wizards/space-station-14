- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceFelinid
  categories: [ HideSpawnMenu ]
  name: felinid appearance
  components:
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: InitialBody
    organs:
      Torso: OrganHumanTorso
      Head: OrganHumanHead
      ArmLeft: OrganHumanArmLeft
      ArmRight: OrganHumanArmRight
      HandRight: OrganHumanHandRight
      HandLeft: OrganHumanHandLeft
      LegLeft: OrganHumanLegLeft
      LegRight: OrganHumanLegRight
      FootLeft: OrganHumanFootLeft
      FootRight: OrganHumanFootRight
      Brain: OrganHumanBrain
      Eyes: OrganHumanEyes
      Tongue: OrganHumanTongue
      Appendix: OrganHumanAppendix
      Ears: OrganHumanEars
      Lungs: OrganHumanLungs
      Heart: OrganHumanHeart
      Stomach: OrganFelinidStomach
      Liver: OrganHumanLiver
      Kidneys: OrganHumanKidneys
  - type: HumanoidProfile
    species: Felinid

- type: entity
  parent:
  - AppearanceFelinid
  - BaseSpeciesMobOrganic
  id: MobFelinid
  name: Urist McMeow
  components:
  - type: Butcherable
    spawned:
    - id: FoodMeat
      amount: 4
  - type: Speech
    speechSounds: Alto
    speechVerb: Felinid
    allowedEmotes: [ 'CatMeow', 'CatHisses', 'Growl' ]
  - type: Vocal
    sounds:
      Male: MaleFelinid
      Female: FemaleFelinid
      Unsexed: MaleFelinid
  - type: Damageable
    damageModifierSet: Felinid
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    animation: WeaponArcClaw
    damage:
      types:
        Piercing: 2
        Slash: 3
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 43
  - type: TemperatureDamage
    heatDamageThreshold: 320
    coldDamageThreshold: 250
    coldDamage:
      types:
        Cold: 0.08
    heatDamage:
      types:
        Heat: 1.8
  - type: TemperatureProtection
    heatingCoefficient: 1.1
    coolingCoefficient: 0.7
  - type: PassiveDamage
    allowedStates:
    - Alive
    damage:
      types:
        Blunt: -0.10
        Piercing: -0.10
        Slash: -0.10
        Heat: -0.07
  - type: NoShoesSilentFootsteps
  - type: EyeDamageOnFlashing
    flashDurationMultiplier: 1.8
    eyeDamageChance: 0.5
    eyeDamage: 2

- type: entity
  parent: [ OrganBaseStomach, OrganHumanInternal ]
  id: OrganFelinidStomach
  suffix: felinid
  components:
  - type: Metabolizer
    metabolizerTypes: [ Animal ]
