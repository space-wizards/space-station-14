- type: markingsGroup
  parent: Undergarments
  id: Felinid
  limits:
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.FacialHair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Chest:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.HeadTop:
      limit: 1
      required: true
      default: [ FelinidEarsBasic ]
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: true
      default: [ FelinidTailBasic ]
    enum.HumanoidVisualLayers.LArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LFoot:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RFoot:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Snout:
      limit: 0
      required: false
    enum.HumanoidVisualLayers.Special:
      limit: 0
      required: false

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceFelinid
  categories: [ HideSpawnMenu ]
  name: felinid appearance
  components:
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: InitialBody
    organs:
      Torso: OrganFelinidTorso
      Head: OrganFelinidHead
      ArmLeft: OrganFelinidArmLeft
      ArmRight: OrganFelinidArmRight
      HandRight: OrganFelinidHandRight
      HandLeft: OrganFelinidHandLeft
      LegLeft: OrganFelinidLegLeft
      LegRight: OrganFelinidLegRight
      FootLeft: OrganFelinidFootLeft
      FootRight: OrganFelinidFootRight
      Brain: OrganHumanBrain
      Eyes: OrganHumanEyes
      Tongue: OrganHumanTongue
      Appendix: OrganHumanAppendix
      Ears: OrganHumanEars
      Lungs: OrganHumanLungs
      Heart: OrganHumanHeart
      Stomach: OrganFelinidStomach
      Liver: OrganHumanLiver
      Kidneys: OrganHumanKidneys
  - type: HumanoidProfile
    species: Felinid

- type: entity
  parent:
  - AppearanceFelinid
  - BaseSpeciesMobOrganic
  id: MobFelinid
  name: Urist McMeow
  components:
  - type: Butcherable
    spawned:
    - id: FoodMeat
      amount: 4
  - type: Speech
    speechSounds: Alto
    speechVerb: Felinid
    allowedEmotes: [ 'CatMeow', 'CatHisses', 'Growl' ]
  - type: Vocal
    sounds:
      Male: MaleFelinid
      Female: FemaleFelinid
      Unsexed: MaleFelinid
  - type: Damageable
    damageModifierSet: Felinid
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    animation: WeaponArcClaw
    damage:
      types:
        Piercing: 2
        Slash: 3
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 43
  - type: TemperatureDamage
    heatDamageThreshold: 320
    coldDamageThreshold: 250
    coldDamage:
      types:
        Cold: 0.08
    heatDamage:
      types:
        Heat: 1.8
  - type: TemperatureProtection
    heatingCoefficient: 1.1
    coolingCoefficient: 0.7
  - type: PassiveDamage
    allowedStates:
    - Alive
    damage:
      types:
        Blunt: -0.10
        Piercing: -0.10
        Slash: -0.10
        Heat: -0.07
  - type: NoShoesSilentFootsteps
  - type: EyeDamageOnFlashing
    flashDurationMultiplier: 1.8
    eyeDamageChance: 0.5
    eyeDamage: 2

- type: entity
  parent: [ OrganBaseStomach, OrganHumanInternal ]
  id: OrganFelinidStomach
  suffix: felinid
  components:
  - type: Metabolizer
    metabolizerTypes: [ Animal ]

# Visual external organs — sprite as human, but marking group "Felinid"
# so ears (HeadTop) and tail (Tail/Chest) markings are applied.
- type: entity
  parent: OrganHuman
  id: OrganFelinidExternal
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/parts.rsi
  - type: VisualOrgan
    data:
      sprite: Mobs/Species/Human/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Felinid

- type: entity
  parent: [ OrganBaseTorsoSexed, OrganBaseTorso, OrganFelinidExternal ]
  id: OrganFelinidTorso

- type: entity
  parent: [ OrganBaseHeadSexed, OrganBaseHead, OrganFelinidExternal ]
  id: OrganFelinidHead
  components:
  - type: VisualOrganMarkings
    hideableLayers:
    - enum.HumanoidVisualLayers.Hair
    - enum.HumanoidVisualLayers.HeadTop

- type: entity
  parent: [ OrganBaseArmLeft, OrganFelinidExternal ]
  id: OrganFelinidArmLeft

- type: entity
  parent: [ OrganBaseArmRight, OrganFelinidExternal ]
  id: OrganFelinidArmRight

- type: entity
  parent: [ OrganBaseHandLeft, OrganFelinidExternal ]
  id: OrganFelinidHandLeft

- type: entity
  parent: [ OrganBaseHandRight, OrganFelinidExternal ]
  id: OrganFelinidHandRight

- type: entity
  parent: [ OrganBaseLegLeft, OrganFelinidExternal ]
  id: OrganFelinidLegLeft

- type: entity
  parent: [ OrganBaseLegRight, OrganFelinidExternal ]
  id: OrganFelinidLegRight

- type: entity
  parent: [ OrganBaseFootLeft, OrganFelinidExternal ]
  id: OrganFelinidFootLeft

- type: entity
  parent: [ OrganBaseFootRight, OrganFelinidExternal ]
  id: OrganFelinidFootRight
