- type: antag
  id: Thief
  name: roles-antag-thief-name
  antagonist: true
  setPreference: true
  objective: roles-antag-thief-objective
  guides: [ Thieves ]
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 1h

- type: antagSpecifier
  parent: RestrictedAntag
  id: Thief
  prefRoles:
  - Thief
  range:
    min: 1
    max: 3
  playerRatio: 20
  lateJoinAdditional: true
  allowNonHumans: true
  multiAntagSetting: NotExclusive
  startingGear: ThiefGear
  components:
  - type: Pacified
  - type: Thieving
    stripTimeReduction: 2
    stealthy: true
  mindRoles:
  - MindRoleThief
  briefing:
    sound: "/Audio/Misc/thief_greeting.ogg"

- type: startingGear
  id: ThiefGear
  storage:
    back:
    - ThiefBeacon
    - SatchelThief
