- type: antag
  id: Nukeops
  name: roles-antag-nuclear-operative-name
  antagonist: true
  setPreference: true
  objective: roles-antag-nuclear-operative-objective
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 5h
  guides: [ NuclearOperatives ]

- type: antag
  id: NukeopsMedic
  name: roles-antag-nuclear-operative-agent-name
  antagonist: true
  setPreference: true
  objective: roles-antag-nuclear-operative-agent-objective
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 5h
  - !type:RoleTimeRequirement
    role: JobChemist
    time: 3h
  guides: [ NuclearOperatives ]

- type: antag
  id: NukeopsCommander
  name: roles-antag-nuclear-operative-commander-name
  antagonist: true
  setPreference: true
  objective: roles-antag-nuclear-operative-commander-objective
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 5h
  - !type:DepartmentTimeRequirement
    department: Security
    time: 5h
  # should be changed to nukie playtime when thats tracked (wyci)
  guides: [ NuclearOperatives ]

- type: antagSpecifier
  abstract: true
  parent: RestrictedAntag
  id: BaseNukeops
  name: nukie
  prefRoles:
  - GenericTeamAntagonist # For antag ban purposes
  roleLoadout:
  - RoleSurvivalNukie
  components:
  - type: NukeOperative
  - type: NpcFactionMember
    factions:
    - Syndicate

- type: antagSpecifier
  parent: BaseNukeops
  id: NukeOpsCommander
  name: nuclear operative commander
  prefRoles:
  - NukeopsCommander
  spawnerPrototype: SpawnPointNukeopsCommander
  startingGear: SyndicateCommanderGearFull
  components:
  - type: RandomMetadata
    nameSegments:
    - NamesSyndicateElite
    nameFormat: name-format-nukie-commander
  mindRoles:
  - MindRoleNukeopsCommander

- type: antagSpecifier
  parent: BaseNukeops
  id: NukeopsMedic
  name: nuclear operative corpsman
  prefRoles:
  - NukeopsMedic
  spawnerPrototype: SpawnPointNukeopsMedic
  startingGear: SyndicateOperativeMedicFull
  components:
  - type: RandomMetadata
    nameSegments:
    - NamesSyndicateNormal
    nameFormat: name-format-nukie-agent
  mindRoles:
  - MindRoleNukeopsMedic

- type: antagSpecifier
  parent: BaseNukeops
  id: NukeopsOperative
  prefRoles:
  - Nukeops
  spawnerPrototype: SpawnPointNukeopsOperative
  range:
    min: 1
    max: 3
  playerRatio: 10
  startingGear: SyndicateOperativeGearFull
  components:
  - type: RandomMetadata
    nameSegments:
    - NamesSyndicateNormal
    nameFormat: name-format-nukie-operator
  mindRoles:
  - MindRoleNukeops

- type: antagSpecifier
  parent: BaseNukeops
  id: LoneOp
  name: lone operative
  spawnerPrototype: SpawnPointLoneNukeOperative
  pickPlayer: false
  startingGear: SyndicateLoneOperativeGearFull
  components:
  - type: RandomMetadata
    nameSegments:
    - NamesSyndicatePrefix
    - NamesSyndicateNormal
    nameFormat: name-format-nukie-generic
  mindRoles:
  - MindRoleLoneops

- type: startingGear
  id: SyndicateOperativeGearFullNoUplink
  equipment:
    jumpsuit: ClothingUniformJumpsuitOperative
    back: ClothingBackpackDuffelSyndicate
    mask: ClothingMaskGasSyndicate
    eyes: ClothingEyesHudSyndicate
    ears: ClothingHeadsetAltSyndicate
    gloves: ClothingHandsGlovesCombat
    outerClothing: ClothingOuterHardsuitSyndie
    shoes: ClothingShoesBootsCombatFilled
    id: SyndiOperativePDA
    pocket2: PlushieCarp
    belt: ClothingBeltMilitaryWebbing
  storage:
