- type: constructionGraph		
  id: ConveyorCornerGraph		
  start: start		
  graph:		
    - node: start		
      edges:		
        - to: entity	
          steps:	
            - tag: ConveyorAssembly	
              icon:		
                sprite: Structures/conveyor.rsi
                state: conveyor_loose
              name: construction-graph-tag-conveyor-belt-assembly
              doAfter: 2
    - node: item
      entity: ConveyorBeltAssembly
      actions:
        - !type:SetAnchor
          value: false
    - node: entity
      entity: ConveyorBeltCorner
      actions:
        - !type:SetAnchor
          value: true
        - !type:SnapToGrid
      edges:
        - to: item
          steps:
            - tool: Prying
              doAfter: 3
          completed:
            - !type:SetAnchor
              value: false