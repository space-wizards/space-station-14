- type: constructionGraph
  id: ConveyorCornerGraph
  start: start
  graph:

  - node: start
    edges:
    - to: entity
      steps:
      - material: ConveyorBeltStack
        amount: 1
        doAfter: 2

  - node: item
    entity: ConveyorBeltAssembly
    actions:
    - !type:SetAnchor
      value: false
  
  - node: entity
    entity: ConveyorBeltCorner
    actions:
    - !type:SetAnchor
      value: true
    - !type:SnapToGrid
    edges:
    - to: item
      steps:
      - tool: Prying
        doAfter: 3
