- type: constructionGraph
  id: WindowDirectionalCorner
  start: start
  graph:
    - node: start
      edges:

        - to: windowDirectionalCorner
          steps:
            - material: Glass
              amount: 1
              doAfter: 2

        - to: windowReinforcedDirectionalCorner
