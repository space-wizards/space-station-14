- type: constructionGraph
  id: Cable
  start: start
  graph:

  - node: start
    entity: CableApcStack1
    edges:
    - to: CableMV
      steps:
      - material: Cable
        amount: 2

  - node: CableMV
    entity: CableMVStack1
    edges:
    - to: start
      completed:
      - !type:GivePrototype
        prototype: CableApcStack1
      steps:
      - material: CableMV
    - to: CableHV
      steps:
      - material: CableMV
        amount: 2
      - material: MetalRod

  - node: CableHV
    entity: CableHVStack1
    edges:
    - to: CableMV
      completed:
      - !type:GivePrototype
        prototype: CableMVStack1
      - !type:GivePrototype
        prototype: PartRodMetal1
      steps:
      - material: CableHV
    - to: cable_terminal
      steps:
      - material: CableHV

  - node: cable_terminal
    entity: CableTerminal
    edges:
    - to: CableHV
      steps:
      - tool: Cutting
