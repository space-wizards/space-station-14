- type: entity
  name: BasePistolCS
  parent: [BaseWeaponPistol, BaseSecurityContraband]
  id: BasePistolCS
  description: usp-s
  components:
  - type: Sprite
    sprite: Objects/counterstrike/Weapons/SecondaryCT/usp.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: Objects/counterstrike/Weapons/SecondaryCT/usp.rsi
  - type: Item
    storedOffset: 0,-2
  - type: Gun
    fireRate: 5
    minAngle: 3
    maxAngle: 60
    angleIncrease: 5
    angleDecay: 15
    selectedMode: SemiAuto
    availableModes:
      - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/counterstrike/guns/m4s.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistol
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistol
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: CartridgePistol
        priority: 1
        whitelist:
          tags:
            - CartridgePistol
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: StaticPrice
    price: 1000

- type: entity
  name: BaseRiffleCS
  parent: [BaseWeaponRifle, BaseSecurityContraband]
  id: BaseRiffleCS
  description: ak47 from csgo.
  components:
  - type: Sprite
    sprite: Objects/counterstrike/Weapons/PrimaryT/ak47.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Gun
    fireRate: 7
    minAngle: 5
    maxAngle: 60
    angleIncrease: 7
    angleDecay: 15
    selectedMode: FullAuto
    availableModes:
      - FullAuto
    soundGunshot:
      path: /Audio/Weapons/counterstrike/guns/ak.ogg
  - type: GunWieldBonus
    minAngle: -1
    maxAngle: -1
  - type: Clothing
    sprite: Objects/counterstrike/Weapons/PrimaryT/ak47.rsi
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineLightRifle
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineLightRifle
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: CartridgeLightRifle
        priority: 1
        whitelist:
          tags:
            - CartridgeLightRifle
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance