- type: entity
  name: AK-47
  parent: [BaseWeaponRifle, BaseSecurityContraband, BaseRiffleCS]
  id: WeaponRifleAk47
  description: ak47 from csgo.
  components:
  - type: Sprite
    sprite: Objects/counterstrike/Weapons/PrimaryT/ak47.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Gun
    fireRate: 6
    minAngle: 3
    maxAngle: 70
    angleIncrease: 6
    angleDecay: 15
    selectedMode: FullAuto
    availableModes:
      - FullAuto
    soundGunshot:
      path: /Audio/Weapons/counterstrike/guns/ak.ogg
  - type: GunWieldBonus
    minAngle: -1
    maxAngle: -1
  - type: Clothing
    sprite: Objects/counterstrike/Weapons/PrimaryT/ak47.rsi
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineLightRifle
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineLightRifle
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: CartridgeLightRifle
        priority: 1
        whitelist:
          tags:
            - CartridgeLightRifle
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance

