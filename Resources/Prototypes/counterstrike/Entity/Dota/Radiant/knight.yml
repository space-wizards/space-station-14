- type: entity
  name: Radiant Knight's Sword
  parent: [ BaseSword, BaseMajorContraband ]
  id: RadiantKnightSword
  description: a great sword.
  components:
  - type: Tag
    tags:
    - Machete
  - type: Sprite
    sprite: Objects/counterstrike/Weapons/Dota/Radiant/Knight/Melee/sword.rsi
  - type: MeleeWeapon
    damage:
      types:
        Slash: 10
        Piercing: 10
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Item
    size: Huge
    shape:
    - 0,0,0,2
  - type: DisarmMalus
  - type: Tool
    qualities:
    - Slicing

- type: entity
  name: Radiant poleaxe
  parent: [BaseItem, BaseEngineeringContraband]
  id: RadiantPoleaxe
  description: big axe.
  components:
  - type: Sharp
  - type: Execution
    doAfterDuration: 4.0
  - type: Sprite
    sprite: Objects/counterstrike/Weapons/Dota/Radiant/Knight/Melee/knight.rsi
    state: icon
  - type: MeleeWeapon
    wideAnimationRotation: 135
    swingLeft: true
    attackRate: 0.75
    damage:
      types:
        Blunt: 1
        Slash: 1
        Structural: 1
    soundHit:
      collection: MetalThud
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 5
        Slash: 20
        Structural: 2
  - type: Item
    size: Ginormous
  - type: Clothing
    sprite: Objects/counterstrike/Weapons/Dota/Radiant/Knight/Melee/knight.rsi
    quickEquip: false
    slots:
    - back