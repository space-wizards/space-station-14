- type: entity
  name: Dire Recruit's Sword
  parent: [ BaseSword, BaseMajorContraband ]
  id: DireRecruitSword
  description: an evil sword.
  components:
  - type: Sprite
    sprite: Objects/counterstrike/Weapons/Dota/Radiant/Recruit/Melee/recruitsword.rsi
  - type: MeleeWeapon
    damage:
      types:
        Slash: 16
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Item
    size: Huge
    shape:
    - 0,0,0,2
  - type: DisarmMalus
  - type: Tool
    qualities:
    - Slicing

- type: entity
  parent: ClothingHeadHelmetBase
  id: ClothingHeadHelmetDireSoldier
  name: Dire Soldier's Helmet
  description: Evil one.
  components:
  - type: HideLayerClothing
    layers:
      Hair : HEAD
  - type: Sprite
    sprite: Objects/counterstrike/Clothing/Hats/DireSoldier.rsi
  - type: Clothing
    sprite: Objects/counterstrike/Clothing/Hats/DireSoldier.rsi
  - type: Armor #This is intentionally not spaceproof, when the time comes to port the values from SS13 this should be buffed from what it was.
    modifiers:
      coefficients:
        Blunt: 0.50
        Slash: 0.80
        Piercing: 0.80
        Heat: 0.80
        Radiation: 0.80
        Caustic: 0.95
  - type: ExplosionResistance
    damageCoefficient: 0.4

- type: entity
  parent: ClothingOuterArmorBase
  id: ClothingOuterArmorDireSoldier
  name: Dire Soldier's Armor
  description: Also evil one.
  components:
  - type: Sprite
    sprite: Objects/counterstrike/Clothing/Suit/DireSoldier.rsi
  - type: Clothing
    sprite: Objects/counterstrike/Clothing/Suit/DireSoldier.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.3
        Slash: 0.6
        Piercing: 0.6
        Heat: 0.5
  - type: ExplosionResistance
    damageCoefficient: 0.3
  - type: ClothingSpeedModifier
    walkModifier: 0.8
    sprintModifier: 0.8
  - type: Reflect
    reflectProb: 0.2
    spread: 75
    reflectingInHands: false

- type: entity
  name: Mosinka
  parent: [BaseWeaponRifle, BaseSecurityContraband]
  id: WeaponDotaMosin
  description: by dizi4k.
  components:
  - type: Sprite
    sprite: Objects/counterstrike/Weapons/Dota/Dire/Recruit/Guns/mosin.rsi
    layers:
      - state: icon
  - type: Gun
    fireRate: 1
    minAngle: 5
    maxAngle: 30
    angleIncrease: 8
    angleDecay: 15
    selectedMode: SemiAuto
    availableModes:
      - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/counterstrike/guns/awp.ogg
  - type: GunWieldBonus
    minAngle: -5
    maxAngle: -5
  - type: Clothing
    sprite: Objects/counterstrike/Weapons/Dota/Dire/Recruit/Guns/mosin.rsi
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_chamber:
        name: Chamber
        startingItem: ShellDotaBall
        priority: 1
        whitelist:
          tags:
            - ShellDotaBall
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 2
    pvsIncrease: 0.2
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot