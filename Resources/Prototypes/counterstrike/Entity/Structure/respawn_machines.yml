- type: entity
  parent: BaseRespawnMachine
  id: RespawnMachineAssistant
  name: respawn machine ASSISTANT
  description: A station device that will queue and respawn players of a configured role when they die.
  components:
  - type: RespawnMachine
    # The job prototype id this machine will respawn. Leave blank to configure per-instance in-map.
    # Example: "Assistant"
    job: Passenger
    respawnDelay: 5
    enabled: true

- type: entity
  parent: BaseRespawnMachine
  id: RespawnMachineMusician
  name: respawn machine MUSICIAN
  description: A station device that will queue and respawn players of a configured role when they die.
  components:
  - type: RespawnMachine
    # The job prototype id this machine will respawn. Leave blank to configure per-instance in-map.
    # Example: "Assistant"
    job: Musician
    respawnDelay: 5
    enabled: true