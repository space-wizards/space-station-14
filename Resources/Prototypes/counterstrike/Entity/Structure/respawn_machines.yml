- type: entity
  parent: BaseRespawnMachine
  id: RespawnMachineRadiant
  name: respawn machine Radiant
  description: Radiant's Respawning Machine.
  components:
  - type: RespawnMachine
    # The job prototype id this machine will respawn. Leave blank to configure per-instance in-map.
    # Example: "Assistant"
    job: Scientist
    respawnDelay: 5
    enabled: true

- type: entity
  parent: BaseRespawnMachine
  id: RespawnMachineDire
  name: respawn machine Dire
  description: Dire's Respawning Machine.
  components:
  - type: RespawnMachine
    # The job prototype id this machine will respawn. Leave blank to configure per-instance in-map.
    # Example: "Assistant"
    job: ResearchAssistant
    respawnDelay: 5
    enabled: true