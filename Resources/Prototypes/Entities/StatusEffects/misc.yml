- type: entity
  abstract: true
  id: StatusEffectBase
  components:
  - type: StatusEffect
  - type: Sprite
    drawdepth: Effects
  - type: Tag
    tags:
    - HideContextMenu

- type: entity
  parent: StatusEffectBase
  id: MobStatusEffectBase
  abstract: true
  components:
  - type: StatusEffect
    whitelist:
      components:
      - MobState

# Things that should be removed by rejuvenation should parent to this
# Also blocks the status effect being added to godmode-ed entities.
- type: entity
  abstract: true
  parent: StatusEffectBase
  id: StatusEffectDebuff
  components:
  - type: RejuvenateRemovedStatusEffect

- type: entity
  abstract: true
  parent: [ MobStatusEffectBase, StatusEffectDebuff ]
  id: MobStatusEffectDebuff

- type: entity
  abstract: true
  parent: MobStatusEffectDebuff
  id: MobStandStatusEffectBase
  components:
  - type: StatusEffect
    whitelist:
      components:
      - MobState
      - StandingState
      requireAll: true
    blacklist: # This blacklist exists because mob prototypes are smelly and everything needs a standing state component.
      tags:
      - KnockdownImmune

# The creature sleeps so heavily that nothing can wake him up. Not even its own death.
- type: entity
  parent: MobStatusEffectDebuff
  id: StatusEffectForcedSleeping
  name: forced sleep
  components:
  - type: ForcedSleepingStatusEffect
  - type: StunnedStatusEffect
  - type: KnockdownStatusEffect

# This creature is asleep because it's disconnected from the game.
- type: entity
  parent: MobStatusEffectBase # Not even rejuvenate can cure SSD...
  id: StatusEffectSSDSleeping
  name: forced sleep
  components:
  - type: ForcedSleepingStatusEffect
  - type: StunnedStatusEffect
  - type: KnockdownStatusEffect

# Blurs your vision and makes you randomly fall asleep
- type: entity
  parent: MobStatusEffectDebuff
  id: StatusEffectDrowsiness
  name: drowsiness
  components:
  - type: DrowsinessStatusEffect

# Adds drugs overlay
- type: entity
  parent: MobStatusEffectDebuff
  id: StatusEffectSeeingRainbow
  name: hallucinations
  components:
  - type: SeeingRainbowsStatusEffect

# Causes your vision to become blurry and gives me a headache.
- type: entity
  parent: MobStatusEffectDebuff
  id: StatusEffectWoozy
  name: woozy
  components:
  - type: DrunkStatusEffect

# Causes you to get drunk
- type: entity
  parent: [ StatusEffectWoozy, StatusEffectSlurred, StatusEffectSway ]
  id: StatusEffectDrunk
  name: drunk

## Jitter

- type: entity
  parent: [StatusEffectBase, StatusEffectDebuff]
  id: StatusEffectJitter
  name: jittering
  components:
  - type: JitteringStatusEffect
    jitter:
      frequency: 3
      maxRadius: 0.08
      minRadius: 0.02

- type: entity
  parent: StatusEffectJitter
  id: StatusEffectFastJitter
  name: heavy jittering
  components:
  - type: JitteringStatusEffect
    jitter:
      frequency: 15
      maxRadius: 0.03
      minRadius: 0.03


- type: entity
  parent: StatusEffectJitter
  id: StatusEffectSway
  name: swaying
  components:
  - type: JitteringStatusEffect
    jitter:
      frequency: 0.7
      maxRadius: 0.3
      minRadius: 0.1
      matrixY: 0, 0.1
