# TODO: Fix - The idea is that blood and vomit is potentially not tile-bound versions of puddles(?)
# TODO: Replace this whole thing with a SolutionFillComponent that uses a reagent table.
- type: entity
  id: PuddleTemporary
  parent: Puddle
  abstract: true
  components:
  - type: Transform
    anchored: true
    noRot: false
  - type: SolutionManager
    solutions:
    - SolutionPuddle

- type: entity
  parent: Solution
  id: SolutionPuddle
  components:
  - type: Solution
    id: puddle
    solution:
      maxVol: 1000 # Puddles really shouldn't have a max volume, but if I set it to 0 they will break atm. This will be removed at a later date.

- type: entity
  id: PuddleSmear
  parent: PuddleTemporary
  suffix: Smear

- type: entity
  id: PuddleVomit
  parent: PuddleTemporary
  suffix: Vomit
  components:
  - type: SolutionManager
    solutions:
    - SolutionPuddleVomit

- type: entity
  parent: SolutionPuddle
  id: SolutionPuddleVomit
  components:
  - type: Solution
    solution:
      reagents:
      - ReagentId: Vomit
        Quantity: 10

