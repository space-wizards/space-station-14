- type: entity
  id: JetpackEffect # TODO: Rename it to JetpackEffectBlue
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 2
  - type: Sprite
    drawdepth: SmallMobs
    noRot: true
    layers:
    - shader: unshaded
      map: ["enum.EffectLayers.Unshaded"]
      sprite: Effects/jetpack.rsi
      state: bliue_sparkles
  - type: EffectVisuals
  - type: Tag
    tags:
      - HideContextMenu
  - type: AnimationPlayer

- type: entity
  id: JetpackEffectGreen
  parent: JetpackEffect
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    layers:
    - state: green_sparkles

- type: entity
  id: JetpackEffectOrange
  parent: JetpackEffect
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    layers:
    - state: orange_sparkles

- type: entity
  id: JetpackEffectPurple
  parent: JetpackEffect
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    layers:
    - state: purple_sparkles

- type: entity
  id: JetpackEffectRed
  parent: JetpackEffect
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    layers:
    - state: red_sparkles
