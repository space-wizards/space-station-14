- type: entity
  id: JetpackEffect # TODO: Rename it to JetpackEffectBlue
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    drawdepth: SmallMobs
    noRot: true
    layers:
    - shader: unshaded
      map: [ "enum.EffectLayers.Unshaded" ]
      sprite: Effects/jetpack.rsi
      state: blue_sparkles
  - type: TimedDespawn
    lifetime: 2
  - type: EffectVisuals
  - type: AnimationPlayer
  - type: Tag
    tags:
      - HideContextMenu

