# Second-hand (defective) grenade/explosive variants for the Second Hand uplink tab.

# Worn explosive grenade: one-third the normal blast radius.
- type: entity
  name: worn explosive grenade
  parent: ExGrenade
  id: ExGrenadeWorn
  suffix: Second Hand
  description: An explosive grenade with degraded filler charge. Creates a much smaller explosion than standard - don't expect it to breach more than a window.
  components:
  - type: Explosive
    explosionType: Default
    maxIntensity: 5
    intensitySlope: 3
    totalIntensity: 40
    canCreateVacuum: false

# Degraded smoke grenade: shorter duration and smaller cloud than normal.
- type: entity
  name: degraded smoke grenade
  parent: SmokeGrenade
  id: SmokeGrenadeWorn
  suffix: Second Hand
  description: A smoke grenade with dried-out compound. Produces a smaller cloud that dissipates in about 10 seconds. Better than nothing for a moment of cover.
  components:
  - type: SmokeOnTrigger
    keysIn:
    - timer
    duration: 10
    spreadAmount: 20

# Low-charge shrapnel grenade: half the normal pellet count.
- type: entity
  name: low-charge shrapnel grenade
  parent: GrenadeShrapnel
  id: GrenadeShrapnelWorn
  suffix: Second Hand
  description: A shrapnel grenade with a weakened charge and only half the pellet fill. Still bleeds people. Fewer of them, less severely.
  components:
  - type: ProjectileGrenade
    fillPrototype: PelletClusterLethal
    capacity: 15

# Warmish grenade: fewer fragments and a random fuse between 2 and 7 seconds.
- type: entity
  name: warmish grenade
  parent: GrenadeIncendiary
  id: GrenadeIncendiaryWorn
  suffix: Second Hand
  description: An incendiary grenade with a corroded fuse and only half the normal pellet fill. The countdown is unpredictable — somewhere between 2 and 7 seconds after you pull the pin. Plan accordingly.
  components:
  - type: ProjectileGrenade
    fillPrototype: PelletClusterIncendiary
    capacity: 15
  - type: TimerTrigger
    beepSound:
      path: "/Audio/Effects/beep1.ogg"
      params:
        volume: 5
    initialBeepDelay: 0
    beepInterval: 2
    delay: 3.5
  - type: RandomFuse
    minDelay: 2
    maxDelay: 7

# Grenade pongwin: wobbles toward you slowly, smaller boom.
- type: entity
  name: grenade pongwin
  parent: MobGrenadePenguin
  id: MobGrenadePenguinWorn
  suffix: Second Hand
  description: A grenade penguin that's seen better days. It ambles toward you more slowly than a healthy specimen and its payload is noticeably reduced. It still explodes. It's still a penguin.
  components:
  - type: MovementSpeedModifier
    baseWalkSpeed: 1.5
    baseSprintSpeed: 2.5
  - type: Explosive
    explosionType: Default
    maxIntensity: 7
    intensitySlope: 3
    totalIntensity: 80

# Crusty exploding pen: random fuse between 2 and 9 seconds.
- type: entity
  name: pen
  parent: PenExploding
  id: PenExplodingWorn
  suffix: Second Hand, Exploding
  description: A pen with a corroded detonator circuit. Still goes off when clicked — but the fuse is anyone's guess, anywhere from 2 to 9 seconds. Keep that in mind before handing it to someone.
  components:
  - type: TimerTrigger
    delay: 4
    examinable: false
  - type: RandomFuse
    minDelay: 2
    maxDelay: 9

# Rusty minibomb: longer fuse, same blast.
- type: entity
  name: rusty minibomb
  parent: SyndieMiniBomb
  id: SyndieMiniBombWorn
  suffix: Second Hand
  description: A syndicate minibomb with a corroded detonator that takes a full 9 seconds to fire instead of the standard 5. Same blast radius. Just more time to think about what you've done.
  components:
  - type: TimerTrigger
    delay: 9
