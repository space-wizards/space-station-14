# Second-hand (defective) grenade/explosive variants for the Second Hand uplink tab.

- type: entity
  parent: ExGrenade
  id: ExGrenadeWorn
  suffix: Second Hand
  components:
  - type: RandomDefects
  - type: TimerTrigger
    examinable: false
  - type: RandomFuseDefect
    minDelay: 1.5
    maxDelay: 9
  - type: RandomExplosiveYieldDefect
    prob: 0.7
    maxIntensityMin: 3
    maxIntensityMax: 7
    totalIntensityMin: 25
    totalIntensityMax: 60

- type: entity
  parent: SmokeGrenade
  id: SmokeGrenadeWorn
  suffix: Second Hand
  components:
  - type: RandomDefects
  - type: TimerTrigger
    examinable: false
  - type: SmokeOnTrigger
    keysIn:
    - timer
    duration: 10
    spreadAmount: 20
  - type: RandomFuseDefect
    minDelay: 1.5
    maxDelay: 9

- type: entity
  parent: GrenadeShrapnel
  id: GrenadeShrapnelWorn
  suffix: Second Hand
  components:
  - type: RandomDefects
  - type: TimerTrigger
    examinable: false
  - type: ProjectileGrenade
    fillPrototype: PelletClusterLethal
  - type: RandomFuseDefect
    minDelay: 1.75
    maxDelay: 10.5
  - type: RandomExplosiveYieldDefect
    prob: 0.7
    capacityMin: 8
    capacityMax: 20

- type: entity
  parent: GrenadeIncendiary
  id: GrenadeIncendiaryWorn
  suffix: Second Hand
  components:
  - type: RandomDefects
  - type: TimerTrigger
    beepSound:
      path: "/Audio/Effects/beep1.ogg"
      params:
        volume: 5
    initialBeepDelay: 0
    beepInterval: 2
    delay: 3.5
    examinable: false
  - type: ProjectileGrenade
    fillPrototype: PelletClusterIncendiary
  - type: RandomFuseDefect
    minDelay: 1.75
    maxDelay: 10.5
  - type: RandomExplosiveYieldDefect
    prob: 0.7
    capacityMin: 8
    capacityMax: 20

- type: entity
  parent: MobGrenadePenguin
  id: MobGrenadePenguinWorn
  suffix: Second Hand
  components:
  - type: RandomDefects
  - type: TimerTrigger
    examinable: false
  - type: MovementSpeedModifier
    baseWalkSpeed: 1.5
    baseSprintSpeed: 2.5
  - type: RandomFuseDefect
    minDelay: 5
    maxDelay: 30
  - type: RandomExplosiveYieldDefect
    prob: 0.7
    maxIntensityMin: 4
    maxIntensityMax: 9
    totalIntensityMin: 55
    totalIntensityMax: 110

- type: entity
  parent: PenExploding
  id: PenExplodingWorn
  suffix: Second Hand, Exploding
  components:
  - type: RandomDefects
  - type: TimerTrigger
    delay: 4
    examinable: false
  - type: RandomFuseDefect
    minDelay: 2
    maxDelay: 12

- type: entity
  parent: SyndieMiniBomb
  id: SyndieMiniBombWorn
  suffix: Second Hand
  components:
  - type: RandomDefects
  - type: TimerTrigger
    delay: 5
    examinable: false
  - type: RandomFuseDefect
    minDelay: 5
    maxDelay: 15

- type: entity
  parent: SingularityGrenade
  id: SingularityGrenadeWorn
  suffix: Second Hand
  components:
  - type: RandomDefects
  - type: TimerTrigger
    examinable: false
  - type: TwoStageTrigger
    triggerDelay: 5
  - type: RandomFuseDefect
    minDelay: 1.5
    maxDelay: 9
