# Second-hand (worn/damaged) melee weapon variants for the Second Hand uplink tab.

# Worn energy sword: loose power connector, missing handle, weak power cell.
- type: entity
  parent: EnergySword
  id: EnergySwordWorn
  suffix: Second Hand
  components:
  - type: RandomDefects
  - type: LoosePowerConnectorDefect
    prob: 0.55
  - type: DamageUserDefect
    prob: 0.40
    damage:
      types:
        Heat: 5
  - type: ReducedDamageDefect
    prob: 0.55

# Worn energy dagger: same defect pool as energy sword.
- type: entity
  parent: EnergyDagger
  id: EnergyDaggerWorn
  suffix: Second Hand, E-Dagger
  components:
  - type: RandomDefects
  - type: LoosePowerConnectorDefect
    prob: 0.55
  - type: DamageUserDefect
    prob: 0.40
    damage:
      types:
        Heat: 5
  - type: ReducedDamageDefect
    prob: 0.55

# Partial throwing knives kit: 4 knives instead of the usual 8.
- type: entity
  parent: ThrowingKnivesKit
  id: ThrowingKnivesKitWorn
  suffix: Second Hand
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase:
        id: ThrowingKnife
        amount: 4
