- type: entity
  parent: WatcherBolt
  id: BoltTempgunCold
  categories: [ HideSpawnMenu ]
  name: freezing bolt
  components:
  - type: Reflective
    reflective:
    - Energy
  - type: Projectile
    #soundHit: Waiting on serv3
    impactEffect: BulletImpactEffectDisabler
    damage:
      types:
        Cold: 10
  - type: TimedDespawn
    lifetime: 3
  - type: ChangeTemperatureOnCollide
    heat: -100000

- type: entity
  parent: WatcherBoltMagmawing
  id: BoltTempgunHot
  categories: [ HideSpawnMenu ]
  name: scorching bolt
  components:
  - type: Reflective
    reflective:
    - Energy
  - type: Projectile
    #soundHit: Waiting on serv3
    impactEffect: BulletImpactEffectOrangeDisabler
    damage:
      types:
        Heat: 10
  - type: ChangeTemperatureOnCollide
    heat: 100000 #This may be a bit underpowered, but in testing, 130000 was RIDICULOUS and killed in seconds.
