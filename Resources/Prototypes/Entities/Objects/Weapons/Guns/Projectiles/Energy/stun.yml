# Energy crossbow
- type: entity
  parent: [ SolutionAmmo, BaseBullet ]
  id: EnergyCrossbowBolt
  categories: [ HideSpawnMenu ]
  name: energy bolt
  description: This'll hurt.
  components:
  - type: Reflective
    reflective:
    - NonEnergy
  - type: Ammo
    muzzleFlash: null
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: crossbowbolt
      shader: unshaded
  - type: Projectile
    damage:
      types:
        Piercing: 2
  - type: StunOnCollide #somewhat mirror to taser stats, meant to be tot 'sidegrade'
    stunAmount: 0
    knockdownAmount: 2.5
    slowdownAmount: 2.5
    walkSpeedModifier: 0.2
    sprintSpeedModifier: 0.2
    drop: false
  - type: StaminaDamageOnCollide #additional stam damage to make repeated pushups less of a viable counter
    damage: 45
  - type: Solution
    solution:
      maxVol: 1.5
      reagents:
      - ReagentId: Toxin
        Quantity: 1.5
  - type: SolutionInjectOnProjectileHit
    transferAmount: 1.5
    solution: ammo
