- type: entity
  id: MuzzleFlashEffect
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    drawdepth: BelowMobs
    layers:
    - shader: unshaded
      map: [ "enum.EffectLayers.Unshaded" ]
      sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
      state: muzzle_bullet
