- type: entity
  abstract: true
  parent: [ BaseItem, PowerCellSlotHighItem ]
  id: WeaponEnergyCrossbowBase
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Basic/energy_crossbow.rsi
  - type: Item
    sprite: Objects/Weapons/Guns/Basic/energy_crossbow.rsi
    size: Normal
  - type: Gun
    fireRate: 5 #high firerate innately bottlenecked by ammo regeneration speed.
    selectedMode: SemiAuto
    minAngle: 0
    maxAngle: 5
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/energycrossbow_shoot.ogg
  - type: AmmoCounter
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.AmmoVisuals.HasAmmo:
        empty-icon:
          True: { visible: False }
          False: { visible: True }
  - type: BallisticAmmoSelfRefiller
    firingPausesAutoRefill: true
    autoRefillPauseDuration: 5 #2 seconds of KD, should always have CD > KD
    autoRefillRate: 0
    powerConsumption: 180
    rechargeSound:
      path: /Audio/Weapons/Guns/MagIn/energycrossbow_reload.ogg
  - type: BallisticAmmoProvider
    proto: EnergyCrossbowBolt
    capacity: 1
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot
        showEnts: False
        occludes: True
        ent: null
      ballistic-ammo: !type:Container
        showEnts: False
        occludes: True
        ents: [ ]

- type: entity
  parent: [WeaponEnergyCrossbowBase, BaseSyndicateContraband]
  id: WeaponEnergyCrossbow
  name: mini energy crossbow
  description: Launches renewable toxic arrows capable of flooring targets instantly.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Basic/energy_crossbow.rsi
    state: icon
  - type: Item
    sprite: Objects/Weapons/Guns/Basic/energy_crossbow.rsi
  - type: StaticPrice
    price: 2500
