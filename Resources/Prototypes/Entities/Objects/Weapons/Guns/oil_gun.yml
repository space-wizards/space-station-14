- type: entity
  parent: [BaseItem, BaseXenoborgContraband]
  id: WeaponOilGun
  name: oil gun
  description: This gun launches vials of xenoborg oil to make organics slip or become flamable if hit with a direct hit
  components:
  - type: Appearance
  - type: Sprite
    sprite: Objects/Weapons/Guns/Basic/oilgun.rsi
    layers:
    - state: icon
    - state: mag-5
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: false
  - type: Item
    size: Large
  # - type: CustomSpriteAmmoCounter
  - type: AmmoCounter
  - type: Gun
    fireRate: 10
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/magnetic_shot.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty_beep.ogg
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 0.75
    rechargeSound:
      path: /Audio/Weapons/Guns/MagIn/kinetic_reload.ogg
  - type: BasicEntityAmmoProvider
    proto: XenoborgOilChemistryVial
    capacity: 5
    count: 5
