# Second-hand (worn/damaged) shotgun variants for the Second Hand uplink tab.

# Worn Bulldog: half the fire rate, worse spread.
# The bolt carrier group is worn and the feed ramp is bent.
- type: entity
  name: worn bulldog
  parent: WeaponShotgunBulldog
  id: WeaponShotgunBulldogWorn
  suffix: Second Hand
  description: A Bulldog whose bolt carrier can't keep pace anymore. Still full-auto, just at half speed. The bent feed ramp occasionally misfeeds but not often enough to save anyone from it.
  components:
  - type: Gun
    fireRate: 1
    minAngle: 8
    maxAngle: 16
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/shotgun.ogg

# Worn Hushpup: half the fire rate, doubled spread modifier.
# The muffler baffles are blown and the action is gummed up.
- type: entity
  name: worn hushpup
  parent: WeaponShotgunHushpup
  id: WeaponShotgunHushpupWorn
  suffix: Second Hand
  description: A Hushpup with a dying suppressor and a gummed-up action. Still quieter than most guns. The pattern opens up badly past close range. Uses .50 shotgun shells.
  components:
  - type: Gun
    fireRate: 1
  - type: GunSpreadModifier
    spread: 2.4
