# Second-hand (worn/damaged) shotgun variants for the Second Hand uplink tab.

# Worn Bulldog: worn bolt carrier, bent feed ramp, half fire rate.
- type: entity
  parent: WeaponShotgunBulldog
  id: WeaponShotgunBulldogWorn
  suffix: Second Hand
  components:
  - type: RandomDefects
  - type: Gun
    fireRate: 1
    minAngle: 8
    maxAngle: 16
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/shotgun.ogg
  - type: GunWieldBonus
    minAngle: -4
    maxAngle: -8
  - type: GunJam
    prob: 0.75
    jamChance: 0.18

# Worn Hushpup: blown suppressor baffles, gummed action, doubled spread.
- type: entity
  parent: WeaponShotgunHushpup
  id: WeaponShotgunHushpupWorn
  suffix: Second Hand
  components:
  - type: RandomDefects
  - type: Gun
    fireRate: 1
  - type: GunSpreadModifier
    spread: 2.4
  - type: GunJam
    prob: 0.7
    jamChance: 0.18
