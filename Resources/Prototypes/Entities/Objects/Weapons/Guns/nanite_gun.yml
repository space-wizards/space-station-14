- type: entity
  parent: [BaseItem, BaseXenoborgContraband]
  id: WeaponNaniteGun
  name: nanite gun
  description: A strange gun that shoots regenerating crystal shards.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Rifles/nanite.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    size: Large
  - type: Clothing
    sprite: Objects/Weapons/Guns/Shotguns/bulldog.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: AmmoCounter
  - type: Gun
    fireRate: 0.5
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/nanite_gun.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
  - type: BallisticAmmoProvider
    whitelist:
     tags:
      - NaniteGun
    capacity: 12
    proto: CartridgeNanite
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/shotgun_insert.ogg
    cycleable: false # No synthesizing ammo
  - type: BallisticAmmoSelfRefiller
    autoRefillRate: 10s
    affectedByEmp: true
  - type: StaticPrice
    price: 5000
  - type: MagazineVisuals
    magState: mag-unshaded
    steps: 5
    zeroVisible: true
  - type: Appearance
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
        ents: [ ]
