# Second-hand (partial) magazine variants for the Second Hand uplink tab.
# These inherit from their base counterparts but have reduced capacity due to a damaged spring or worn housing.

# Partial Viper high-capacity magazine: 7 rounds instead of 15.
# The spring tension is shot and the feed lips are bent.
- type: entity
  name: worn machine pistol magazine (.35 auto)
  parent: MagazinePistolHighCapacity
  id: MagazinePistolHighCapacityWorn
  suffix: Second Hand, 7/15
  description: A worn 15-round Viper magazine. The damaged spring can only reliably feed 7 rounds before it starts misfiring.
  components:
  - type: BallisticAmmoProvider
    capacity: 7
    proto: CartridgePistol

# Partial SMG magazine: 15 rounds instead of 30.
# The magazine housing is cracked and the follower sticks halfway.
- type: entity
  name: worn SMG magazine (.35 auto)
  parent: MagazinePistolSubMachineGun
  id: MagazinePistolSubMachineGunWorn
  suffix: Second Hand, 15/30
  description: A beat-up 30-round SMG magazine. The cracked polymer housing and sticky follower limit reliable capacity to 15 rounds.
  components:
  - type: BallisticAmmoProvider
    capacity: 15
    proto: CartridgePistol

# Partial Cobra magazine: 5 rounds instead of 10.
# The cracked follower jams against the feed lips halfway up.
- type: entity
  name: worn pistol magazine (.25 caseless)
  parent: MagazinePistolCaselessRifle
  id: MagazinePistolCaselessRifleWorn
  suffix: Second Hand, 5/10
  description: A 10-round Cobra magazine with a cracked follower. The spring tension is too low to reliably feed more than 5 rounds.
  components:
  - type: BallisticAmmoProvider
    capacity: 5

# Partial Bulldog pellet drum: 4 rounds instead of 8.
# The latch that holds shells in the back half of the drum is snapped off.
- type: entity
  name: worn ammo drum (.50 pellet)
  parent: MagazineShotgun
  id: MagazineShotgunWorn
  suffix: Second Hand, 4/8
  description: A Bulldog pellet drum with a broken latch. Only the front-loaded 4 shells seat securely enough to feed.
  components:
  - type: BallisticAmmoProvider
    capacity: 4

# Partial Bulldog slug drum: 4 rounds instead of 8.
# Same housing damage as the pellet drum but loaded with slugs.
- type: entity
  name: worn ammo drum (.50 slug)
  parent: MagazineShotgunSlug
  id: MagazineShotgunSlugWorn
  suffix: Second Hand, 4/8
  description: A Bulldog slug drum with a snapped rear latch. Only 4 slugs are seated securely enough to fire reliably.
  components:
  - type: BallisticAmmoProvider
    capacity: 4

# Partial rifle magazine: 12 rounds instead of 25.
# The cracked polymer shell lets the follower drag.
- type: entity
  name: worn magazine (.20 rifle)
  parent: MagazineRifle
  id: MagazineRifleWorn
  suffix: Second Hand, 12/25
  description: A 25-round rifle magazine with a hairline crack in the polymer shell. Follower drag makes feeding unreliable past 12 rounds.
  components:
  - type: BallisticAmmoProvider
    capacity: 12

# Partial light rifle ammo box: 30 rounds instead of 60.
# Half the rounds are corroded or deformed.
- type: entity
  name: worn ammunition box (.30 rifle)
  parent: MagazineBoxLightRifle
  id: MagazineBoxLightRifleWorn
  suffix: Second Hand, 30/60
  description: A cardboard box of .30 rifle rounds that's been sitting in storage too long. Half the rounds are corroded or seated too loosely to fire reliably. 30 good ones remain.
  components:
  - type: BallisticAmmoProvider
    capacity: 30
