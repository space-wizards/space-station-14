# Second-hand (mixed-ammo) magazine variants for the Second Hand uplink tab.
# Each spawns with a random round count and a weighted mix of compatible ammo types
# (excluding armor-piercing), in shuffled order. Free in the uplink.

- type: entity
  parent: MagazinePistolHighCapacity
  id: MagazinePistolHighCapacityWorn
  suffix: Second Hand
  components:
  - type: MixedAmmoFill
    minFillFraction: 0.7
    maxFillFraction: 1.0
    entries:
      - proto: CartridgePistol
        weight: 5
      - proto: CartridgePistolIncendiary
        weight: 2
      - proto: CartridgePistolUranium
        weight: 1
      - proto: CartridgePistolPractice
        weight: 3
      - proto: CartridgePistolFoam
        weight: 2

