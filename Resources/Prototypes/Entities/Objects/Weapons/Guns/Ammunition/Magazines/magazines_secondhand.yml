# Second-hand (partial) magazine variants for the Second Hand uplink tab.
# These inherit from their base counterparts but have reduced capacity due to a damaged spring or worn housing.

# Partial Viper high-capacity magazine: 7 rounds instead of 15.
# The spring tension is shot and the feed lips are bent.
- type: entity
  parent: MagazinePistolHighCapacity
  id: MagazinePistolHighCapacityWorn
  suffix: Second Hand, 7/15
  components:
  - type: BallisticAmmoProvider
    capacity: 7
    proto: CartridgePistol

# Partial SMG magazine: 15 rounds instead of 30.
# The magazine housing is cracked and the follower sticks halfway.
- type: entity
  parent: MagazinePistolSubMachineGun
  id: MagazinePistolSubMachineGunWorn
  suffix: Second Hand, 15/30
  components:
  - type: BallisticAmmoProvider
    capacity: 15
    proto: CartridgePistol

