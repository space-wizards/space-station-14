- type: entity
  id: MuzzleFlashEffectNanite
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 0.4
  - type: Sprite
    drawdepth: BelowMobs
    layers:
     - shader: unshaded
       map: ["enum.EffectLayers.Unshaded"]
       sprite: Objects/Weapons/Guns/Projectiles/nanite_crystal.rsi
       state: muzzle_nanite
  - type: EffectVisuals
  - type: Tag
    tags:
    - HideContextMenu
  - type: AnimationPlayer

- type: entity
  id: BulletImpactEffectNanite
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 0.25
  - type: Sprite
    drawdepth: Effects
    layers:
     - shader: unshaded
       map: ["enum.EffectLayers.Unshaded"]
       sprite: Objects/Weapons/Guns/Projectiles/nanite_crystal.rsi
       state: impact_nanite
  - type: EffectVisuals
  - type: Tag
    tags:
    - HideContextMenu

- type: entity
  parent: BaseBullet
  id: BulletNanite
  categories: [ HideSpawnMenu ]
  name: nanite crystal
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/nanite_crystal.rsi
    layers:
    - state: nanite
      shader: unshaded
  - type: Projectile
    impactEffect: BulletImpactEffectNanite
    damage:
      types:
        Piercing: 5
        Cellular: 3
    soundHit:
      path: /Audio/Effects/glass_break2.ogg
  - type: ComplexProjectileDamage
    damageOptions:
    - damage:
        types:
          Blunt: -10
          Piercing: -10
          Slash: -10
          Heat: -10
          Shock: -10
      whitelist:
        components:
        - Xenoborg
