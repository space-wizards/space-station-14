# Second-hand (worn/damaged) pistol variants for the Second Hand uplink tab.
# These inherit from their base counterparts but have reduced stats to reflect wear and damage.

# Worn Viper: half the fire rate, significantly worse spread.
# The selector switch sticks in semi-auto and the barrel is bent.
- type: entity
  name: worn viper
  parent: WeaponPistolViper
  id: WeaponPistolViperWorn
  suffix: Second Hand
  description: A heavily used Viper with a selector switch that sticks on semi-auto and a warped barrel. Better than nothing.
  components:
  - type: Gun
    fireRate: 3
    minAngle: 6
    maxAngle: 18
    angleIncrease: 3

# Worn Cobra: half the fire rate, significantly worse spread.
# The suppressor internals are worn out - still quiet, just inaccurate.
- type: entity
  name: worn cobra
  parent: WeaponPistolCobra
  id: WeaponPistolCobraWorn
  suffix: Second Hand
  description: A beat-up Cobra with a suppressor that's seen better days. The baffles are blown and the slide doesn't cycle quite right.
  components:
  - type: Gun
    fireRate: 2
    minAngle: 6
    maxAngle: 18
    angleIncrease: 3
