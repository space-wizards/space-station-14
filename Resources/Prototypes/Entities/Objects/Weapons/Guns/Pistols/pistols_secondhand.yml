# Second-hand (worn/damaged) pistol variants for the Second Hand uplink tab.

# Worn Viper: semi-auto only, warped barrel.
- type: entity
  name: worn viper
  parent: WeaponPistolViper
  id: WeaponPistolViperWorn
  suffix: Second Hand
  description: A heavily used Viper with a selector switch that sticks on semi-auto and a warped barrel. Better than nothing.
  components:
