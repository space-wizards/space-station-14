- type: entity
  parent: [BaseItem, BaseXenoborgContraband]
  id: WeaponTileGun
  name: tile gun
  description: A strange gun that shoots tiles. Shoot them with the floor!
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Basic/tilegun.rsi
  - type: Item
    size: Large
  - type: AmmoCounter
  - type: Gun
    fireRate: 2
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/shotgun.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
  - type: BallisticAmmoProvider
    whitelist:
      components:
      - FloorTile
    capacity: 30
    proto: FloorTileItemSteel
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/shotgun_insert.ogg
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
        ents: []
  - type: StaticPrice
    price: 5000

- type: entity
  parent: WeaponTileGun
  id: WeaponTileGunEmpty
  suffix: empty
  components:
  - type: BallisticAmmoProvider
    proto: null
