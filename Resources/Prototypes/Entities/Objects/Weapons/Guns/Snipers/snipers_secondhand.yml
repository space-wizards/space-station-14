# Second-hand (worn/damaged) sniper rifle variants for the Second Hand uplink tab.

# Worn Hristov: stress fractures, bent bipod, drifted sights.
- type: entity
  name: worn Hristov
  parent: WeaponSniperHristov
  id: WeaponSniperHristovWorn
  suffix: Second Hand
  description: A Hristov with stress fractures in the receiver and a bipod that collapsed on one side. Fires even slower than usual and the sights have drifted. The round is still the round. Uses .60 anti-materiel ammo.
  components:
  - type: RandomDefects
  - type: Gun
    fireRate: 0.3
    minAngle: 2
    maxAngle: 6
  - type: GunWieldBonus
    minAngle: -2
    maxAngle: -4
  - type: GunJam
    prob: 0.5
    jamChance: 0.10

# Worn Mosin: cosmoline-gummed action, cracked stock, sticky bolt.
- type: entity
  name: worn Mosin
  parent: WeaponSniperMosin
  id: WeaponSniperMosinWorn
  suffix: Second Hand
  description: A Kardashev-Mosin that is somehow in worse shape than usual, which is saying something. The bolt is sticky and the stock is cracked. Still shoots. Still has a bayonet. Some things are eternal. Loads .30 rifle rounds.
  components:
  - type: RandomDefects
  - type: Gun
    fireRate: 0.5
    minAngle: 1
    maxAngle: 4
  - type: GunWieldBonus
    minAngle: -1
    maxAngle: -2
  - type: GunJam
    prob: 0.7
    jamChance: 0.25
