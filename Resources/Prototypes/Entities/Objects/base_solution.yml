- type: entity
  abstract: true
  parent: Solution
  id: SolutionAmmo
  components:
  - type: Solution
    id: ammo

- type: entity
  abstract: true
  parent: Solution
  id: SolutionVapor # TODO Check if this compsystem is identical to spray...
  components:
  - type: Solution
    id: vapor

- type: entity
  abstract: true
  parent: Solution
  id: SolutionSpray
  components:
  - type: Solution
    id: spray

- type: entity
  abstract: true
  parent: Solution
  id: SolutionMop
  components:
  - type: Solution
    id: absorbed

- type: entity
  abstract: true
  parent: Solution
  id: SolutionWelder # TODO Refactor fuel usage to comply with welders becoming 30u-60u
  components:
  - type: Solution
    id: welder

- type: entity
  abstract: true
  parent: Solution
  id: SolutionComposite # For sheets, divide their capacity by 12. For items, check how many sheets they are constructed from.
  components:
  - type: Solution
    id: composite


# Solution Sizes

## Of note, maxVol will be moved out of the Solution class into the SolutionComponent in the future
## These prototypes are meant to generally correspond to an itemSizePrototype, and be used with containers of the same type
## So a beaker will use solutions with a parent of SolutionSmall and a large beaker uses SolutionNormal
## Items with utility or tool functionality should generally inherit from one sizer smaller than their item size.
## It's fine to fine tune these values for specific applications, but generally you shouldn't go above the value the most relevant parent would have.
## Lastly, 60u equals about 1 litre. It was random before but that's the conversion now.

## Very Tiny

- type: entity
  parent: Solution
  id: SolutionVeryTiny # For things smaller than tiny
  components:
  - type: Solution
    solution:
      maxVol: 15

- type: entity
  parent: [SolutionFood, SolutionVeryTiny]
  id: SolutionFoodVeryTiny

- type: entity
  parent: Solution
  id: SolutionToolVeryTiny
  components:
  - type: Solution
    solution:
      maxVol: 7.5

- type: entity
  parent: [SolutionInjector, SolutionToolVeryTiny]
  id: SolutionInjectorVeryTiny

- type: entity
  parent: [SolutionAmmo, SolutionToolVeryTiny]
  id: SolutionAmmoVeryTiny

- type: entity
  parent: [SolutionWelder, SolutionToolVeryTiny]
  id: SolutionWelderVeryTiny

