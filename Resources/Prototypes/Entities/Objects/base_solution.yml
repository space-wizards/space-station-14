- type: entity
  id: Solution # Not abstract because it's a fallback for missing solution protos!
  categories: [ HideSpawnMenu, Inheritable ] # TODO: Dont forget to remove this when you make solutions which exist outside of managers!
  name: solution
  components:
  - type: Solution

# Solution Types

- type: entity
  abstract: true
  parent: Solution
  id: SolutionBeaker
  components:
  - type: Solution
    id: beaker

- type: entity
  abstract: true
  parent: SolutionBeaker
  id: SolutionBeakerCryo
  components:
  - type: Solution
    solution:
      canReact: false

- type: entity
  abstract: true
  parent: Solution
  id: SolutionInjector
