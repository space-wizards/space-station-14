    id: composite


# Solution Sizes

## Of note, maxVol will be moved out of the Solution class into the SolutionComponent in the future
## These prototypes are meant to generally correspond to an itemSizePrototype, and be used with containers of the same type
## So a beaker will use solutions with a parent of SolutionSmall and a large beaker uses SolutionNormal
## Items with utility or tool functionality should generally inherit from one sizer smaller than their item size.
## It's fine to fine tune these values for specific applications, but generally you shouldn't go above the value the most relevant parent would have.
## Lastly, 60u equals about 1 litre. It was random before but that's the conversion now.

## Very Tiny

- type: entity
  parent: Solution
  id: SolutionVeryTiny # For things smaller than tiny
  categories: [ HideSpawnMenu ]
  components:
  - type: Solution
    solution:
      maxVol: 15

- type: entity
  abstract: true
  parent: SolutionVeryTiny
  id: SolutionItemVeryTiny
  components:
  - type: Item
    size: Tiny

- type: entity
