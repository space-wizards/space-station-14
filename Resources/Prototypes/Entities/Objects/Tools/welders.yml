- type: entity
  abstract: true
  parent: [SolutionWelder, BaseItem]
  id: BaseWelder
  components:
  - type: Sprite
    layers:
    - state: icon
    - state: welder_flame
      visible: false
      shader: unshaded
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/welder_drop.ogg
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { visible: true }
          False: { visible: false }
  - type: Item
    size: Small
    sprite: Objects/Tools/welder.rsi
  - type: ItemToggle
    predictable: false
    soundActivate:
      collection: WelderOn
      params:
        variation: 0.125
        volume: -5
    soundDeactivate:
      collection: WelderOff
      params:
        variation: 0.125
        volume: -5
  - type: ItemToggleMeleeWeapon
    activatedSoundOnHit:
      path: /Audio/Weapons/Guns/Hits/energy_meat1.ogg
      params:
        variation: 0.250
        volume: -10
    activatedSoundOnHitNoDamage:
      path: /Audio/Weapons/Guns/Hits/energy_meat1.ogg
      params:
        variation: 0.250
        volume: -12
    deactivatedSoundOnHitNoDamage:
      collection: MetalThud
    activatedDamage:
      types:
        Heat: 8
  - type: ItemToggleSize
    activatedSize: Large
  - type: ItemToggleHot
  - type: ComponentToggler
    components:
    - type: DisarmMalus
      malus: 0.6
  - type: ToggleableVisuals
    spriteLayer: flame
    inhandVisuals:
      left:
      - state: inhand-left-flame
        shader: unshaded
      right:
      - state: inhand-right-flame
        shader: unshaded
  - type: UseDelay
  - type: MeleeWeapon
    wideAnimationRotation: -90
    damage:
      types:
        Blunt: 5 #i mean... i GUESS you could use it like that
    soundHit:
      collection: MetalThud
  - type: RefillableSolution
    solution: welder
  - type: Tool
    useSound:
      collection: Welder
    qualities: Welding
  - type: Welder
  - type: PointLight
    enabled: false
    radius: 1.5
    color: orange
    netsync: false
  - type: ItemTogglePointLight
  - type: Appearance
  - type: RequiresEyeProtection
  - type: PhysicalComposition
    materialComposition:
      Steel: 200
  - type: StaticPrice
    price: 40
  - type: IgnitionSource
    temperature: 700

- type: entity
  parent: [SolutionToolWelder, BaseWelder]
  id: Welder
  name: welding tool
  description: "Melts anything as long as it's fueled, don't forget your eye protection!"
  components:
  - type: Sprite
    sprite: Objects/Tools/welder.rsi

- type: entity
  parent: [SolutionWelder, SolutionSmall]
  id: SolutionToolWelder
  categories: [ HideSpawnMenu ]
  components:
  - type: Solution
    solution:
      maxVol: 100 # TODO: This needs to be dropped to 30
      reagents:
      - ReagentId: WeldingFuel
        Quantity: 100

- type: entity
  name: industrial welding tool
  parent: [SolutionToolWelderIndsutrial, BaseWelder]
  id: WelderIndustrial
  description: "An industrial welder with over double the fuel capacity."
  components:
  - type: Sprite
    sprite: Objects/Tools/welder_industrial.rsi
  - type: Item
    sprite: Objects/Tools/welder_industrial.rsi

- type: entity
  parent: [SolutionWelder, SolutionToolNormal]
  id: SolutionToolWelderIndsutrial
  categories: [ HideSpawnMenu ]
  components:
  - type: Solution
    solution:
      maxVol: 250 # TODO: This needs to be dropped to 60
      reagents:
      - ReagentId: WeldingFuel
        Quantity: 250

- type: entity
  name: advanced industrial welding tool
  parent: WelderIndustrial
  id: WelderIndustrialAdvanced
  description: "An advanced industrial welder with over double the fuel capacity and hotter flame."
  components:
  - type: Sprite
    sprite: Objects/Tools/welder_industrialadv.rsi
  - type: Item
    sprite: Objects/Tools/welder_industrialadv.rsi
  - type: Tool
    speedModifier: 1.3

- type: entity
  name: experimental welding tool
  parent: [SolutionToolWelderExperimental, BaseWelder]
  id: WelderExperimental
  description: "An experimental welder capable of self-fuel generation and less harmful to the eyes."
  components:
  - type: Sprite
    sprite: Objects/Tools/welder_experimental.rsi
  - type: Item
    sprite: Objects/Tools/welder_experimental.rsi
  - type: PointLight
    enabled: false
    radius: 1.5
    color: lightblue
  - type: SolutionRegeneration
    solution: welder
    generated:
      reagents:
      - ReagentId: WeldingFuel
        Quantity: 1
  - type: RequiresEyeProtection
    statusEffectTime: 5 # less harmful; sunglasses can block it

- type: entity
  parent: [SolutionWelder, SolutionToolGinormous] # Bluespace technology
  id: SolutionToolWelderExperimental
  categories: [ HideSpawnMenu ]
  components:
  - type: Solution
    solution:
      reagents:
      - ReagentId: WeldingFuel
        Quantity: 480 # Literally infinite so this number basically doesn't matter, also this should be a battery tbqh.

- type: entity
  name: emergency welding tool
  parent: [SolutionToolWelderMiniEmergency, BaseWelder]
  id: WelderMini
  description: "A miniature welder used during emergencies."
  components:
  - type: Sprite
    sprite: Objects/Tools/welder_mini.rsi
  - type: Item
    size: Tiny
    sprite: Objects/Tools/welder_mini.rsi
  - type: RefillableSolution
    solution: welder
  - type: Tool
    speedModifier: 0.7
  - type: PointLight
    enabled: false
    radius: 1.0
    color: orange

- type: entity
  parent: [SolutionWelder, SolutionTiny]
  id: SolutionToolWelderMiniEmergency # TODO, replace with below :(
  categories: [ HideSpawnMenu ]
  components:
  - type: Solution
    solution:
      maxVol: 50 # TODO: This needs to be dropped to 15
      reagents:
      - ReagentId: WeldingFuel
        Quantity: 50

- type: entity
  parent: [SolutionWelder, SolutionToolTiny]
  id: SolutionToolWelderMini
  categories: [ HideSpawnMenu ]
  components:
  - type: Solution
    solution:
      reagents:
      - ReagentId: WeldingFuel
        Quantity: 15

- type: entity
  parent: [ Welder, BaseXenoborgContraband ]
  id: RefuelingWelder
  name: refueling welding tool
  description: "A slow welder that can refuel itself over time."
  components:
  - type: Tool
    speedModifier: 0.5
  - type: Welder
    fuelConsumption: 2
    fuelLitCost: 1
  - type: SolutionRegeneration
    solution: welder
    generated:
      reagents:
      - ReagentId: WeldingFuel
        Quantity: 0.1
