- type: entityTable
  id: TravelCameraPhotographs
  table: !type:GroupSelector
    children:
    # they will be instanced when the camera takes a picture
    - id: PhotographBlack
    - id: PhotographRed
    - id: PhotographBlue
    - id: PhotographGreen
    - id: PhotographYellow
    - id: PhotographPurple
