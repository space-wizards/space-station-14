- type: entity
  name: travel camera
  parent: Clothing
  id: TravelCamera
  description: A picture says more than a thousand words. Comes with an ultrabright flash and internal photo roll, so make sure every snap counts!
  components:
    # aptly named component for picture taking
    - type: PictureTaker
      photographs:
        # they will be instanced when the camera takes a picture
        - Photograph
        - PhotographRed
        - PhotographBlue
        - PhotographGreen
        - PhotographYellow
        - PhotographPurple
        - PhotographRainbow
    - type: Sprite
      sprite: Objects/Devices/travel_camera.rsi
      state: icon
    - type: Flash
      # it can not be without a melee attack
      flashOnUse: false
      sound: !type:SoundPathSpecifier
        path: /Audio/Misc/camera_snap.ogg
    - type: LimitedCharges
      maxCharges: 4
    - type: MeleeWeapon
      wideAnimationRotation: 180
      damage:
        types:
          Blunt: 0 # melee weapon to allow flashing individual targets
      angle: 10
    - type: Item
      size: Small
      sprite: Objects/Devices/travel_camera.rsi
    - type: UseDelay
    - type: StaticPrice
      price: 100
    - type: Clothing
      slots:
      - neck
      sprite: Objects/Devices/travel_camera.rsi
    - type: Tag
      tags:
      - WhitelistChameleon
# we have a parent so that if we need to add components later on its easier
- type: entity
