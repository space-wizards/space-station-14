- type: entity
  id: Joint
  parent: BaseCigar
  name: joint
  description: A roll of dried plant matter wrapped in thin paper.
  components:
  - type: Sprite
    sprite: Objects/Consumable/Smokeables/Cannabis/joint.rsi
    state: unlit-icon
  - type: Tag
    tags:
      - Cigarette
      - Trash
  - type: SpaceGarbage
  - type: Clothing
    sprite: Objects/Consumable/Smokeables/Cannabis/joint.rsi
    slots: [ mask ]
    equippedPrefix: unlit
  - type: Item
    size: Tiny
  - type: Construction
    graph: smokeableJoint
    node: joint
  - type: Solution
    solution:
      reagents:
      - ReagentId: THC
        Quantity: 20
  - type: RandomMetadata
    nameSegments: [NamesRollie]

- type: entity
  id: JointRainbow
  parent: Joint
  name: joint
  suffix: Rainbow
  description: A roll of dried plant matter wrapped in thin paper. Seems to be colorful inside.
  components:
  - type: Construction
    graph: smokeableJointRainbow
    node: jointRainbow
  - type: Solution
    solution:
      reagents:
      - ReagentId: SpaceDrugs
        Quantity: 10
      - ReagentId: Lipolicide
        Quantity: 5
      - ReagentId: MindbreakerToxin
        Quantity: 5
      - ReagentId: Happiness
        Quantity: 5
  #   - ReagentId: ColorfulReagent
  #     Quantity: 1.33
      - ReagentId: Psicodine
        Quantity: 3.67

