# When adding new food also add to random spawner located in Resources\Prototypes\Entities\Markers\Spawners\Random\Food_Drinks\food_meal.yml
# This is actually soups AND salads. Wild.

- type: entity
  abstract: true
  parent: [SolutionSmall, FoodInjectableBase]
  id: FoodBowlBase
  components:
  - type: Item
    shape:
    - 0,0,1,0
    storedOffset: 0,-3
  - type: Edible
    trash:
    - FoodBowlBig
    utensil: Spoon
  - type: Solution
    solution:
      reagents:
      - ReagentId: Nutriment
        Quantity: 30
  - type: Sprite
    sprite: Objects/Consumable/Food/bowl.rsi
  - type: DamageOnLand
    damage:
      types:
        Blunt: 5
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 5
  - type: Spillable
    solution: food
  # soup weapon!
  - type: MeleeWeapon
    soundNoDamage:
      path: "/Audio/Effects/Fluids/splat.ogg"
    damage:
      types:
        Blunt: 0
  - type: Damageable
  - type: Injurable
    damageContainer: Inorganic
  - type: Tag
    tags:
    - Soup
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
          params:
            volume: -8
      - !type:SpillBehavior { }
      - !type:SpawnEntitiesBehavior
        spawn:
          FoodBowlBigTrash:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

# Custom Soup Example

- type: entity
  name: pea soup
  parent: FoodBowlBase
  id: FoodSoupPea
  description: A humble split pea soup.
