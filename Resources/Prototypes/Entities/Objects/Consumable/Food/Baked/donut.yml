# Base

- type: entity
  abstract: true
  parent: [SolutionVeryTiny, FoodInjectableBase]
  id: FoodDonutBase
  description: Goes great with robust coffee.
  components:
  - type: Tag
    tags:
    - Donut
  - type: Sprite
    sprite: Objects/Consumable/Food/Baked/donut.rsi
  - type: Solution
    solution:
      reagents:
      - ReagentId: Nutriment
        Quantity: 6
      - ReagentId: Sugar
        Quantity: 3
  - type: Item
    sprite: Objects/Consumable/Food/Baked/donut.rsi
    size: Tiny

- type: entity
  abstract: true
  parent: FoodDonutBase
  id: FoodDonutFruitBase
  components:
  - type: Tag
    tags:
    - Donut
    - Fruit
  - type: Solution
    solution:
      reagents:
      - ReagentId: Nutriment
        Quantity: 6
      - ReagentId: Sugar
        Quantity: 3
      - ReagentId: Vitamin
        Quantity: 1
# Tastes like donut.

# The sprinkles are now an overlay, so you can put them on any donut! If we really
# wanted to go for EXTREME roleplay we could apply a different color to the sprinkles
# Since it's technically an alpha layer.

# You'll be able to bake the plain donuts, then mix up different glazes for them to
# apply with a brush or something.

# Plain Donuts

- type: entity
  parent: FoodDonutBase
  id: FoodDonutPlain
  name: plain donut
  components:
  - type: FlavorProfile
    flavors:
      - sweet
  - type: Sprite
    state: plain

- type: entity
  parent: FoodDonutFruitBase
  id: FoodDonutJellyPlain
  name: plain jelly-donut
  components:
  - type: FlavorProfile
    flavors:
      - jelly
  - type: Sprite
    state: jelly-plain

