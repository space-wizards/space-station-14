# When adding new food also add to random spawner located in Resources\Prototypes\Entities\Markers\Spawners\Random\Food_Drinks\food_baked_whole.yml & food_baked_single.yml
# Base

- type: entity
  abstract: true
  parent: [SolutionVeryTiny, FoodInjectableBase]
  id: FoodBagelBase
  description: A delicious bagel.
  components:
  - type: Item
    size: Tiny
  - type: FlavorProfile
    flavors:
      - bread
  - type: Sprite
    sprite: Objects/Consumable/Food/Baked/bagel.rsi
    state: bagel
  - type: Solution
    solution:
      reagents:
      - ReagentId: Nutriment
        Quantity: 10

- type: entity
  parent: FoodBagelBase
  id: FoodBagel
  name: bagel

- type: entity
  parent: FoodBagelBase
  id: FoodBagelPoppy
  name: poppy seed bagel
  description: A delicious bagel topped with bicaridine-infused poppy seeds.
  components:
  - type: FlavorProfile
    flavors:
      - bread
      - medicine
  - type: Sprite
    state: bagel-poppy
  - type: Solution
    solution:
      reagents:
      - ReagentId: Bicaridine
        Quantity: 5
      - ReagentId: Nutriment
        Quantity: 10

- type: entity
  parent: FoodBagelBase
  id: FoodBagelCotton
  name: cotton bagel
  description: A delicious bagel made with cotton dough.
  components:
  - type: FlavorProfile
    flavors:
    - bread
    - cotton
  - type: Sprite
    state: bagel-cottondough
  - type: Edible
    requiresSpecialDigestion: true
  - type: Tag
    tags:
    - ClothMade
  - type: Solution
    solution:
      reagents:
      - ReagentId: Nutriment
        Quantity: 5
      - ReagentId: Fiber
        Quantity: 5
