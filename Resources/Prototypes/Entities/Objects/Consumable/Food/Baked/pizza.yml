# When adding new food also add to random spawner located in Resources\Prototypes\Entities\Markers\Spawners\Random\Food_Drinks\food_meal.yml & food_single.yml
# Base

- type: entity
  abstract: true
  parent: [SolutionNormal, FoodInjectableBase]
  id: FoodPizzaBase
  components:
  - type: FlavorProfile
    flavors:
      - oily
      - bread
  - type: Sprite
    sprite: Objects/Consumable/Food/Baked/pizza.rsi
  - type: Solution
    solution:
      maxVol: 180
      reagents:
      - ReagentId: Nutriment
        Quantity: 120
      - ReagentId: Vitamin
        Quantity: 12
  - type: SliceableFood
    count: 12
  - type: Item
    size: Normal
    shape:
    - 0,0,2,1
    storedOffset: 0,-5
  - type: Tag
    tags:
    - Pizza
    - ReptilianFood

- type: entity
  parent: [SolutionVeryTiny, FoodInjectableBase] # Not sliceable
  id: FoodPizzaSliceBase
  abstract: true
  components:
  - type: FlavorProfile
    flavors:
      - oily
      - bread
  - type: Sprite
    sprite: Objects/Consumable/Food/Baked/pizza.rsi
  - type: Solution
    solution:
      reagents:
      - ReagentId: Nutriment
        Quantity: 10
      - ReagentId: Vitamin
        Quantity: 1
  - type: Item
    size: Tiny
  - type: Tag
    tags:
    - Pizza
    - ReptilianFood
    - Slice

