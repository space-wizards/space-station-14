# Base

- type: entity
  parent: [SolutionTiny, FoodInjectableBase]
  id: FoodDonkpocketBase
  abstract: true
  components:
  - type: Edible
  - type: Sprite
    sprite: Objects/Consumable/Food/Baked/donkpocket.rsi
  - type: Solution
    solution:
      reagents:
      - ReagentId: Nutriment
        Quantity: 10
  - type: Item
    size: Tiny
  - type: Tag
    tags:
    - DonkPocket
    - Meat

# Donkpocket

# Warm gives +5 nutriment.
# Warm ones contain a small amount of Omnizine.

- type: entity
  name: donk-pocket
  parent: FoodDonkpocketBase
  id: FoodDonkpocket
  description: The food of choice for the seasoned traitor.
  components:
  - type: FlavorProfile
    flavors:
      - bread
      - meaty
      - cheap
  - type: Sprite
    state: plain

- type: entity
  parent: [SolutionFood, SolutionTiny]
  id: SolutionFoodDonkpocketWarm
  categories: [ HideSpawnMenu ] # Needed for a very specific lighter so can't be abstract
  components:
  - type: Solution
    solution:
      reagents:
      - ReagentId: Nutriment
        Quantity: 12
      - ReagentId: Omnizine
        Quantity: 3

