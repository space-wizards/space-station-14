# When adding new drinks also add to random spawner located in Resources\Prototypes\Entities\Markers\Spawners\Random\Food_Drinks\drinks_soda.yml
- type: entity
  abstract: true
  parent: [ DrinkBaseMaterialMetal, SolutionSmall, DrinkBase, DrinkBaseOpenable, DrinkVisualsOpenable ]
  id: DrinkCanBase
  components:
  - type: Solution
    solution:
      maxVol: 40 # Cans are about 330ml which translates to about 40u
  - type: SolutionManager
    solutions:
    - SolutionCanComposite
  - type: SolutionTransfer
    canChangeTransferAmount: true
    maxTransferAmount: 15
  - type: Extractable
    grindableSolutionName: composite
  - type: FitsInDispenser
    solution: drink
  - type: Tool
    qualities:
    - Rolling
    speedModifier: 0.25 # its small so takes longer to roll the entire dough flat
  - type: SpaceGarbage
  - type: TrashOnSolutionEmpty
    solution: drink
  - type: PhysicalComposition
    materialComposition:
      Steel: 50 #reduce, reuse, recycle
  - type: Tag
    tags:
    - DrinkCan

# When adding new drinks also add to random spawner located in Resources\Prototypes\Entities\Markers\Spawners\Random\Food_Drinks\drinks_soda.yml
- type: entity
  abstract: true
  parent: DrinkCanBase
  id: DrinkCanBaseFull
  suffix: Full # :)

- type: entity
  parent: SolutionComposite
  id: SolutionCanComposite
  categories: [ HideSpawnMenu ]
  components:
  - type: Solution
    solution:
      maxVol: 5
      reagents: # 5u -> 1/2 steel sheet (10u)
      - ReagentId: Aluminium # Fun fact: soda can makeup is approx. 75% aluminium and 25% tin/iron.
        Quantity: 4
      - ReagentId: Iron
        Quantity: 1

