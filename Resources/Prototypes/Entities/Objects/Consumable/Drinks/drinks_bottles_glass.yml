# When adding new drinks also add to random spawner located in Resources\Prototypes\Entities\Markers\Spawners\Random\Food_Drinks\drinks_bottles.yml

- type: entity
  abstract: true
  parent: [ DrinkBaseMaterialGlass, SolutionNormal, DrinkBase, DrinkBaseOpenable, DrinkBaseEmptyTrash ]
  id: DrinkBottleGlassBase
  components:
  - type: Openable
    sound:
      collection: bottleOpenSounds
    closeable: true
    closeSound:
      collection: bottleCloseSounds
  - type: Sprite
    sprite: Objects/Consumable/Drinks/alco-bottle.rsi # fallback
  - type: Tool
    qualities:
    - Rolling
    speedModifier: 0.75 # not as good as a rolling pin but does the job
  - type: Item
    size: Normal
  - type: Tag
    tags:
    - DrinkBottle
    - Trash
  - type: Destructible # Same as parent, but spawns BrokenBottle instead of ShardGlass
    thresholds:
    - trigger: # Overkill threshold
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpillBehavior { }
      - !type:SpawnEntitiesBehavior
        spawn:
          BrokenBottle:
            min: 1
            max: 1
        transferForensics: true
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  abstract: true
  parent: DrinkBottleGlassBase
  id: DrinkBottleGlassBaseFull
  suffix: Full
  components:
  - type: Tag
    tags:
    - DrinkBottle

- type: entity
  abstract: true
  parent: [ SolutionSmall, DrinkBottleGlassBase ]
  id: DrinkBottleGlassSmallBase
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: Objects/Consumable/Drinks/beer.rsi # fallback
  - type: FitsInDispenser
    solution: drink

- type: entity
  abstract: true
  parent: DrinkBottleGlassSmallBase
  id: DrinkBottleGlassSmallBaseFull
  suffix: Full

- type: entity
  abstract: true
  parent: [ SolutionLarge, DrinkBottleGlassBase ]
  id: DrinkBottleGlassLargeBaseFull
  suffix: Full
  components:
  - type: Item
    size: Large
    shape:
    - 0,0,1,3

