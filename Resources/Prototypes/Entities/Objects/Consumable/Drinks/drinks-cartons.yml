- type: entity
  abstract: true
  parent: [ DrinkBaseMaterialCardboard, SolutionNormal, DrinkBase, DrinkBaseOpenable, DrinkVisualsOpenable, DrinkBaseEmptyTrash ]
  id: DrinkCartonBase
  components:
  - type: Openable
    sound:
      collection: bottleOpenSounds #Could use a new sound someday ¯\_(ツ)_/¯
    closeable: true
    closeSound:
      collection: bottleCloseSounds

- type: entity
  abstract: true
  parent: DrinkCartonBase
  id: DrinkCartonBaseFull
  suffix: Full
  components:
  - type: Tag
    tags: []

- type: entity
  abstract: true
  parent: [SolutionSmall, DrinkCartonBase ]
  id: DrinkCartonSmallBase
  components:
  - type: Item
    size: Small

- type: entity
  abstract: true
  parent: DrinkCartonSmallBase
  id: DrinkCartonSmallBaseFull
  suffix: Full
  components:
  - type: Tag
    tags: [ ]

- type: entity
  abstract: true
  parent: [SolutionLarge, DrinkCartonBase ]
  id: DrinkCartonBaseLarge
  components:
  - type: Item
    size: Large
    shape:
    - 0,0,1,3
  - type: Tag
    tags:
    - DrinkBottle # Need this to fit in the soda dispenser, probably needs a better name
    - Trash

- type: entity
  abstract: true
  parent: DrinkCartonBaseLarge
  id: DrinkCartonBaseLargeFull
  suffix: Full
  components:
  - type: Tag
    tags:
    - DrinkBottle # Need this to fit in the soda dispenser, probably needs a better name

