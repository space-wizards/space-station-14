# Leaves
# TODO We have mortar and pestle, all these ground items are very stupid and should just be made by grinding leaves instead of through construction.

- type: entity
  name: cannabis leaves
  parent: ProduceBaseRuminant
  id: LeavesCannabis
  description: "Recently legalized in most galaxies."
  components:
  - type: Sprite
    sprite: Objects/Specific/Hydroponics/cannabis.rsi
  - type: Produce
    seedId: cannabis
  - type: Edible # Precursor to the one true edible
  - type: Solution
    solution:
      reagents:
      - ReagentId: THC
        Quantity: 15

- type: entity
  name: dried cannabis leaves
  parent: ProduceBaseRuminant
  id: LeavesCannabisDried
  description: "Dried cannabis leaves, ready to be ground."
  components:
  - type: Stack
    stackType: LeavesCannabisDried
    count: 1
  - type: Sprite
    sprite: Objects/Specific/Hydroponics/tobacco.rsi
    state: dried

- type: entity
  name: ground cannabis
  parent: [SolutionFood, SolutionTiny, BaseItem]
  id: GroundCannabis
  description: "Ground cannabis, ready to take you on a trip."
  components:
  - type: Stack
    stackType: GroundCannabis
    count: 1
  - type: Solution
    solution:
      reagents:
      - ReagentId: THC
        Quantity: 30 # Takes 2 dried leaves to make one ground cannabis.
  - type: Sprite
    sprite: Objects/Misc/reagent_fillings.rsi
    state: powderpile
    color: darkgreen
  - type: Construction
    graph: smokeableGroundCannabis
    node: ground
  - type: Tag
    tags:
      - Smokable
  - type: Item
    size: Tiny

- type: entity
  name: rainbow cannabis leaves
  parent: LeavesCannabis
  id: LeavesCannabisRainbow
  description: "Is it supposed to be glowing like that...?"
  components:
  - type: Sprite
    layers:
    - sprite: Objects/Specific/Hydroponics/rainbow_cannabis.rsi
      state: produce
      shader: unshaded
  - type: Produce
    seedId: rainbowCannabis
  # disabled because 50 morbillion point lights still break the lighting engine
  #- type: PointLight
  #  radius: 1.5
  #  energy: 2
  #- type: RgbLightController
  #  cycleRate: 0.6
  - type: Solution
    solution:
      reagents:
      - ReagentId: SpaceDrugs
        Quantity: 6
      - ReagentId: Lipolicide
        Quantity: 3
      - ReagentId: MindbreakerToxin
        Quantity: 2
      - ReagentId: Happiness
        Quantity: 2
#       - ReagentId: ColorfulReagent
#         Quantity: 1
      - ReagentId: Psicodine
        Quantity: 1

- type: entity
  name: dried rainbow cannabis leaves
  parent: LeavesCannabisRainbow
  id: LeavesCannabisRainbowDried
  description: "Dried rainbow cannabis leaves, ready to be ground."
  components:
  - type: Stack
    stackType: LeavesCannabisRainbowDried
    count: 1
  - type: Sprite
    sprite: Objects/Specific/Hydroponics/rainbow_cannabis.rsi
    state: dried

- type: entity
  name: ground rainbow cannabis
  parent: GroundCannabis
  id: GroundCannabisRainbow
  description: "Ground rainbow cannabis, ready to take you on a trip."
  components:
  - type: Stack
    stackType: GroundCannabisRainbow
    count: 1
  - type: Solution
    solution:
      reagents:
      - ReagentId: SpaceDrugs
        Quantity: 12
      - ReagentId: Lipolicide
        Quantity: 6
      - ReagentId: MindbreakerToxin
        Quantity: 4
      - ReagentId: Happiness
        Quantity: 4
#       - ReagentId: ColorfulReagent
#         Quantity: 2
      - ReagentId: Psicodine
        Quantity: 2
  - type: Sprite
    sprite: Objects/Specific/Hydroponics/rainbow_cannabis.rsi
    state: powderpile_rainbow
    color: white
  - type: Construction
    graph: smokeableGroundCannabisRainbow
    node: groundRainbow

- type: entity
  name: tea leaves
  parent: ProduceBaseRuminant
  id: LeavesTea
  description: "Can be dried out to make tea."
  components:
  - type: Sprite
    sprite: Objects/Specific/Hydroponics/tea_plant.rsi
  - type: Produce
    seedId: teaPlant
  - type: Solution
    solution:
      reagents:
      - ReagentId: Vitamin
        Quantity: 15

- type: entity
  name: dried tea leaves
  parent: ProduceBaseRuminant
  id: LeavesTeaDried
  description: "Dried tea leaves, ready to be ground."
  components:
  - type: Solution
    solution:
      reagents:
      - ReagentId: Vitamin
        Quantity: 10
      - ReagentId: TeaPowder # Convert some of the Vitamin to Tea
        Quantity: 5
  - type: Sprite
    sprite: Objects/Specific/Hydroponics/tea_plant.rsi
    state: dried

- type: entity
  name: tobacco leaves
  parent: ProduceBaseRuminant
  id: LeavesTobacco
  description: "Dry them out to make some smokes."
  components:
  - type: Sprite
    sprite: Objects/Specific/Hydroponics/tobacco.rsi
  - type: Produce
    seedId: tobacco
  - type: Solution
    solution:
      reagents:
      - ReagentId: Nicotine
        Quantity: 5

- type: entity
  name: dried tobacco leaves
  parent: LeavesTobacco
  id: LeavesTobaccoDried
  description: "Dried tobacco leaves, ready to be ground."
  components:
  - type: Stack
    stackType: LeavesTobaccoDried
    count: 1
  - type: Sprite
    sprite: Objects/Specific/Hydroponics/tobacco.rsi
    state: dried

- type: entity
  name: ground tobacco
  parent: [SolutionFood, SolutionTiny, BaseItem]
  id: GroundTobacco
  description: "Ground tobacco, perfect for hand-rolled cigarettes."
  components:
  - type: Stack
    stackType: GroundTobacco
    count: 1
  - type: Solution
    solution:
      reagents:
      - ReagentId: Nicotine
        Quantity: 10
  - type: Sprite
    sprite: Objects/Misc/reagent_fillings.rsi
    state: powderpile
    color: brown
  - type: Construction
    graph: smokeableGroundTobacco
    node: ground
  - type: Tag
    tags:
      - Smokable
  - type: Item
    size: Tiny
