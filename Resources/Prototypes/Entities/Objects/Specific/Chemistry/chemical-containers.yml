- type: entity
  parent: [ SolutionLarge, DrinkBaseMaterialStrongPlastic, DrinkBase, DrinkVisualsAll ]
  id: Jug
  name: jug
  description: Used to contain a very large amount of chemicals or solutions. Chugging is extremely ill-advised.
  components:
  - type: Sprite
    sprite: Objects/Specific/Chemistry/jug.rsi
  - type: Item
    size: Large
    sprite: Objects/Specific/Chemistry/jug.rsi
  - type: SolutionContainerVisuals
    maxFillLevels: 6
    inHandsMaxFillLevels: 5
  - type: ExaminableSolution
    exactVolume: true # Chemistry item
  - type: StaticPrice
    price: 60
  - type: Tag
    tags:
    - ChemDispensable

