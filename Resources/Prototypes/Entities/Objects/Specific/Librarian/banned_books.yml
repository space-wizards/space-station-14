- type: entity
  abstract: true
  name: banned book
  parent: [ BaseItem, BaseLibrarianContraband ]
  id: BannedBookBase
  description: A hardcover book of dubious legality. Has a "Restricted" sticker on the spine.
  components:
  - type: Tag
    tags:
    - Book
  - type: MeleeWeapon  # This was originally a feature exclusive to the law book but maintainers decided it should apply to all books for consistency. I frankly disagree but :P
    soundHit:
      collection: Punch
    damage:
      types:
        Blunt: 1
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 1

- type: entity
  parent: BannedBookBase
  id: BaelSummonBook
  name: book of shadows
  description: A book of many rituals and rites. The only one that makes any sense to you is said to conjure a familiar. Has a "Restricted" sticker on the spine.
  components:
  - type: Sprite
    sprite: Objects/Specific/Library/Restricted/shadows.rsi
    state: icon
  - type: Item
    size: Small
    sprite: Objects/Specific/Library/Restricted/shadows.rsi
  - type: Summonable
    specialItem: SpawnPointGhostBael
    requiresBibleUser: false
    respawnTime: 0 # Bael is not supposed to be able to die, so if that somehow ever happens you can bring him right back

- type: entity
  parent: BannedBookBase
  id: EmergencyMedipenBook
  name: book of beating hearts
  description: Stops bleeding and gives adrenaline when read. Sometimes, you swear it has a pulse of its own. Has a "Restricted" sticker on the spine.
  components:
  - type: Sprite
    sprite: Objects/Specific/Library/Restricted/hearts.rsi
    state: icon
  - type: Item
    size: Small
    sprite: Objects/Specific/Library/Restricted/hearts.rsi
  - type: TriggerOnUse
  - type: EntityEffectOnTrigger
    targetUser: true
    effects: # If epinephrine gets updated, this will have to be updated too
      - !type:GenericStatusEffect
        key: Adrenaline
        component: IgnoreSlowOnDamage
        time: 10
      - !type:ModifyBleed
        amount: -100000 # This is enough, right
  - type: UseDelay
    delay: 1.0

- type: entity
  parent: BannedBookBase
  id: FleshAmbushBook
  name: book of sinews
  description: Whatever sicko made this book thought it was acceptable to bind it in meat. As for the contents, you can't even hazard a guess ... it's stapled shut! Has a "Restricted" sticker on the spine.
  components:
  - type: Sprite
    sprite: Objects/Specific/Library/Restricted/sinews.rsi
    state: icon
  - type: Item
    size: Small
    sprite: Objects/Specific/Library/Restricted/sinews.rsi
  - type: TriggerOnUse
  - type: EntityEffectOnTrigger
    targetUser: true
    effects: # This one is mostly just a troll
      - !type:SpawnEntityList
        allowMessyPrediction: true
        entries:
          - settings:
              maxAmount: 6
              minRange: 3
              maxRange: 12
            spawns:
            - FleshBlocker
          - settings:
              minAmount: 3
              maxAmount: 8
              maxRange: 12
            spawns:
            - MobFleshJared
            - MobFleshGolem
            - MobFleshClamp
            - MobFleshLover
          - settings:
              maxAmount: 4
              minRange: 3
              maxRange: 12
            spawns:
            - FleshKudzu
  - type: UseDelay
    delay: 360

- type: entity
  parent: BannedBookBase
  id: ProjectileWeaponBook
  name: book of edges
  description: The pages are sharp to the touch, like blades. Has a "Restricted" sticker on the spine.
  components:
  - type: Sprite
    sprite: Objects/Specific/Library/Restricted/edges.rsi
    state: icon
  - type: Item
    size: Small
    sprite: Objects/Specific/Library/Restricted/edges.rsi
  - type: AmmoCounter
  - type: Gun
    soundGunshot: /Audio/Effects/poster_broken.ogg
    soundEmpty: /Audio/Effects/packetrip.ogg
    fireRate: 1.67
    projectileSpeed: 13.0
    selectedMode: FullAuto
    availableModes:
      - FullAuto
    clumsyProof: true
  - type: BasicEntityAmmoProvider
    proto: WeaponBookProjectile
    capacity: 14
  - type: RechargeBasicEntityAmmo
    restoreAll: true
    rechargeCooldown: 22.0

- type: entity
  parent: BannedBookBase
  id: GreedBook
  name: book of wealth
  description: Claims to be able to make you rich in an instant. We'll see about that! Has a "Restricted" sticker on the spine.
  components:
  - type: Sprite
    sprite: Objects/Specific/Library/Restricted/wealth.rsi
    state: icon
  - type: Item
    size: Small
    sprite: Objects/Specific/Library/Restricted/wealth.rsi
  - type: TriggerOnUse
  - type: EntityEffectOnTrigger
    targetUser: true
    effects:
      - !type:SpawnEntityList
        entries:
          - settings:
              minAmount: 3
              maxAmount: 10
              maxRange: 3
            spawns:
            - TreasureCoinSilver
            - TreasureCoinGold
            - SpaceCash10
            - SpaceCash100
            - IngotGold1
      - !type:HealthChange
        damage:
          types:
            Cellular: 25 # The price of greed
  - type: UseDelay
    delay: 60
