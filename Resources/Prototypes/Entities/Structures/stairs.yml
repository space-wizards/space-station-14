- type: entity
  abstract: true
  id: BaseFloorDecoration
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Clickable
  - type: Sprite
    drawdepth: FloorTiles

- type: entity
  id: Stairs
  parent: BaseFloorDecoration
  name: stairs
  suffix: Steel
  description: The greatest invention since rocket-propelled grenades.
  components:
  - type: Anchorable
    flags:
    - Anchorable
  - type: Sprite
    sprite: Structures/stairs.rsi
    state: stairs_steel
  - type: Damageable
    damageModifierSet: Metallic
  - type: Injurable
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 2
            max: 4
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    graph: Stairs
    node: stairs

- type: entity
  id: StairStage
  parent: Stairs
  suffix: Steel, stage
  components:
  - type: Sprite
    sprite: Structures/stairs.rsi
    state: stairs_stage_steel
    drawdepth: FloorTiles
  - type: Construction
    graph: Stairs
    node: stairsStage

