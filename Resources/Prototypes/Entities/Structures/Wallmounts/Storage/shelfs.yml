# Parents
- type: entity
  parent: BaseWallmount
  id: ShelfBase
  abstract: true
  components:
  - type: Sprite
    drawdepth: WallMountedItems
    state: base
  - type: Damageable
    damageContainer: StructuralInorganic
  - type: Storage
    grid:
    - 0,0,5,2
    - 0,4,5,6
    maxItemSize: Large
  - type: UserInterface
    interfaces:
     enum.StorageUiKey.Key:
      type: StorageBoundUserInterface
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
  - type: Construction
    graph: Shelf

- type: entity
  abstract: true
  id: ShelfBaseReinforced
  parent: ShelfBase
  components:
  - type: Lock
  - type: LockedStorage
  - type: LockVisuals
  - type: Sprite
    layers:
    - state: rbase
      map: ["enum.StorageVisualLayers.Base"]
    - state: unlocked
      shader: unshaded
      # used to keep the unlocked light visible while open.
    - state: closed
      map: ["enum.StorageVisualLayers.Door"]
    - state: locked
      map: ["enum.LockVisualLayers.Lock"]
      shader: unshaded
  - type: Appearance
  - type: EntityStorageVisuals
    stateDoorOpen: open
    stateDoorClosed: closed
  - type: AccessReader

# Normal
- type: entity
  id: ShelfWood
  parent: ShelfBase
  name: wooden shelf
  description: A convenient place to place, well, anything really.
  components:
  - type: Sprite
    sprite: Structures/Storage/Shelfs/wood.rsi
  - type: Damageable
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger: # Excess damage, don't spawn entities
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroyHeavy
      - !type:DoActsBehavior
        acts: ["Destruction"]
    - trigger:
        !type:DamageTrigger
        damage: 60
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroyHeavy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank1:
            min: 1
            max: 3
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Tag
    tags:
    - Structure
    - Wooden
  - type: Construction
    node: ShelfWood

