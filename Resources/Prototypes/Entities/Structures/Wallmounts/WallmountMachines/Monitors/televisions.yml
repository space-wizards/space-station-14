- type: entity
  parent: BaseWallmountMachine
  id: WallmountTelevision
  suffix: entertainment
  name: television
  description: Finally, some decent reception around here...
  components:
  - type: Construction
    graph: WallmountTelevision
    node: Television
  - type: Sprite
    sprite: Structures/Wallmounts/flatscreentv.rsi
    layers:
    - state: television_wall_off
    - map: ["enum.PowerDeviceVisualLayers.Powered"]
      state: television_wallscreen
      shader: unshaded
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: SurveillanceCamera
    transmitFrequencyId: SurveillanceCamera
  - type: WirelessNetworkConnection
    range: 200
  - type: DeviceNetworkRequiresPower
  - type: Speech
  - type: SurveillanceCameraSpeaker
  - type: SurveillanceCameraMonitor
  - type: ActivatableUI
    key: enum.SurveillanceCameraMonitorUiKey.Key
  - type: ActivatableUIRequiresPower
  - type: ActivatableUIRequiresVision
  - type: UserInterface
    interfaces:
        enum.SurveillanceCameraMonitorUiKey.Key:
          type: SurveillanceCameraMonitorBoundUserInterface
  - type: PointLight
    radius: 1.5
    energy: 3.0
    color: "#b89f25"
    enabled: false
  - type: LitOnPowered
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
          params:
            volume: -4
  - type: StationAiWhitelist

- type: entity
  parent: BaseWallmountGlass
  id: WallmountTelevisionFrame
  name: television frame
  description: Finally, some decent reception around here...
  components:
  - type: Construction
    graph: WallmountTelevision
    node: TelevisionFrame
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: Structures/Wallmounts/flatscreentv.rsi
    state: television_wall
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
          params:
            volume: -4
