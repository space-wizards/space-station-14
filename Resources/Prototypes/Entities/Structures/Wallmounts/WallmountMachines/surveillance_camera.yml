- type: entity
  abstract: true
  id: SurveillanceCameraBase
  name: camera
  description: A surveillance camera. It's watching you. Kinda.
  placement:
    mode: SnapgridCenter
    snap:
    - Wallmount
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: Structures/Wallmounts/camera.rsi
    layers:
    - map: [ "enum.SurveillanceCameraVisualsKey.Layer" ]
      state: camera
      cycle: true
  - type: Appearance
  - type: Physics
    bodyType: Static
  - type: Clickable
  - type: InteractionOutline
  - type: Fixtures
    fixtures:
      light:
        shape:
          !type:PhysShapeCircle
          radius: 0.5
        hard: false
        mask:
        - GhostImpassable
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,-0.2,-0.15"
        density: 190
        mask:
        - None
        layer:
        - TabletopMachineLayer
  - type: Eye
  - type: PointLight
    enabled: false
    radius: 5
  - type: Damageable
    damageModifierSet: Metallic
  - type: Injurable
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -8
  - type: SlimPoweredLight
    enabled: false
  - type: Electrified
    enabled: false
    usesApcPower: true
  - type: WallMount
  - type: ApcPowerReceiver
  - type: ExtensionCableReceiver
  - type: WiresPanel
  - type: Wires
    alwaysRandomize: true
    layoutId: SurveillanceCamera
  - type: DeviceNetwork
    deviceNetId: Wired
    transmitFrequencyId: SurveillanceCamera
    prefix: device-address-prefix-camera
  - type: DeviceNetworkRequiresPower
  - type: WiredNetworkConnection
  - type: StationAiVision
  - type: CameraActiveOnCollide
    requiresPower: false # TODO: Change this when AI can no longer see via unpowered cameras
  - type: Construction
    graph: SurveillanceCamera
    node: camera
  - type: StaticPrice
    price: 200
  - type: SurveillanceCameraVisuals
    sprites:
      Active: camera
      Disabled: camera_off
      InUse: camera_in_use
  - type: UserInterface
    interfaces:
      enum.SurveillanceCameraSetupUiKey.Camera:
        type: SurveillanceCameraSetupBoundUi
      enum.WiresUiKey.Key:
        type: WiresBoundUserInterface

- type: entity
  parent: SurveillanceCameraBase
  id: SurveillanceCameraConstructed
  name: camera
  suffix: Constructed
  components:
  - type: SurveillanceCamera
    setupAvailableNetworks:
    - SurveillanceCameraEngineering
    - SurveillanceCameraSecurity
    - SurveillanceCameraService
    - SurveillanceCameraSupply
    - SurveillanceCameraScience
    - SurveillanceCameraGeneral
    - SurveillanceCameraMedical
    - SurveillanceCameraCommand

- type: entity
  parent: SurveillanceCameraBase
  id: SurveillanceCameraEngineering
  name: camera
  suffix: Engineering
  components:
  - type: DeviceNetwork
    receiveFrequencyId: SurveillanceCameraEngineering
    prefix: device-address-prefix-camera
  - type: SurveillanceCamera
    networkSet: true

