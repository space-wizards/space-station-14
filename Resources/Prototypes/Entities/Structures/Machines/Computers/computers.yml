- type: entity
  id: StationAiUploadComputer
  parent: BaseComputer
  name: AI upload console
  description: Used to update the laws of the station AI.
  components:
  - type: ComputerVisuals
    stateScreen: aiupload
  - type: ApcPowerReceiver
    powerLoad: 50
  - type: PowerState
    idlePowerDraw: 50
    workingPowerDraw: 1000
  - type: Computer
    board: StationAiUploadCircuitboard
  - type: AccessReader
    access: [ [ "ResearchDirector" ] ]
  - type: Lock
    unlockOnClick: false
  - type: SiliconLawUpdater
    components:
    - type: StationAiHeld
  - type: ItemSlotsLock
    slots:
    - circuit_holder
  - type: ItemSlotRequiresPower
  - type: ItemSlots
    slots:
      circuit_holder:
        name: circuit-holder
        insertSuccessPopup: silicon-laws-updated
        whitelist:
          requireAll: true
          components:
          - SiliconLawProvider
          - Item
  - type: ContainerContainer
    containers:
      circuit_holder: !type:ContainerSlot
      board: !type:Container

- type: entity
  id: StationAiFixerComputer
  parent: BaseComputer
  name: AI restoration console
  description: Used to repair damaged artifical intelligences.
  components:
  - type: ComputerVisuals
    stateScreen: ai-fixer-empty
    stateKeys: rd_key
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.StationAiFixerConsoleVisuals.Key:
        enum.ComputerVisualLayers.Screen:
          Repair0: { state: ai-fixer-progress-0 }
          Repair1: { state: ai-fixer-progress-1 }
          Repair2: { state: ai-fixer-progress-2 }
          Repair3: { state: ai-fixer-progress-3 }
          Purge0: { state: ai-fixer-purge-0 }
          Purge1: { state: ai-fixer-purge-1 }
          Purge2: { state: ai-fixer-purge-2 }
          Purge3: { state: ai-fixer-purge-3 }
          Empty: { state: ai-fixer-empty }
          Occupied: { state: ai-fixer-full }
          Rebooting: { state: ai-fixer-404 }
          Dead: { state: ai-fixer-404 }
  - type: ApcPowerReceiver
    powerLoad: 50
  - type: PowerState
    idlePowerDraw: 50
    workingPowerDraw: 1000
  - type: Computer
    board: StationAiFixerCircuitboard
  - type: AccessReader
    access: [ [ "ResearchDirector" ] ]
  - type: Lock
    unlockOnClick: false
  - type: StationAiFixerConsole
  - type: ItemSlotsLock
    slots:
    - station_ai_holder
  - type: ItemSlotRequiresPower
  - type: ItemSlots
    slots:
      station_ai_holder:
        ejectOnBreak: true
        lockedFailPopup: station-ai-fixer-console-is-locked
        whitelistFailPopup: station-ai-fixer-console-station-ai-holder-required
        whitelist:
          requireAll: true
          components:
          - StationAiHolder
          - Item
  - type: ContainerContainer
    containers:
      station_ai_holder: !type:ContainerSlot
      board: !type:Container
  - type: ActivatableUI
    key: enum.StationAiFixerConsoleUiKey.Key
  - type: UserInterface
    interfaces:
      enum.StationAiFixerConsoleUiKey.Key:
        type: StationAiFixerConsoleBoundUserInterface
      enum.WiresUiKey.Key:
        type: WiresBoundUserInterface

