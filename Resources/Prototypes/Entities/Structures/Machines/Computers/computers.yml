    stateScreen: comm_syndie
    stateKeys: syndie_key
  - type: AccessReader
    access: [[ "NuclearOperative" ]]
  - type: CommunicationsConsole
    title: comms-console-announcement-title-nukie
    color: "#ff0000"
    canShuttle: false
    global: true #announce to everyone they're about to fuck shit up
    announceSentBy: false # The title already says who they are.
    sound: /Audio/Announcements/war.ogg
  - type: Computer
    board: SyndicateCommsComputerCircuitboard
  - type: PointLight
    radius: 1.5
    energy: 4.0
    color: "#f71713"

- type: entity
  parent: ComputerComms
