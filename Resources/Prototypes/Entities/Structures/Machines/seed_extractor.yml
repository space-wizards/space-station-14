- type: entity
  id: SeedExtractor
  name: seed extractor
  parent: [ BaseMachinePowered, ConstructibleMachine ]
  description: Extracts seeds from produce.
  components:
  - type: Sprite
    sprite: Structures/Machines/seed_extractor.rsi
    snapCardinals: true
    layers:
    - state: seedextractor-off
    - state: seedextractor-unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.4,0.25,0.4"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }
  - type: SeedExtractor
  - type: Machine
    board: SeedExtractorMachineCircuitboard

  # HONK START
  - type: SeedExtractorStorage
    whitelist:
      components:
      - Seed
  - type: ActivatableUI
    key: enum.SeedExtractorStorageUiKey.Key
  - type: ActivatableUIRequiresPower
  - type: UserInterface
    interfaces:
      enum.SeedExtractorStorageUiKey.Key:
        type: SeedExtractorStorageBoundUserInterface
  - type: ContainerContainer
    containers:
      seed_extractor_seeds: !type:Container {}
  # HONK END
