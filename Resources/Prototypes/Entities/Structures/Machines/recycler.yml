- type: entity
  id: Recycler
  parent: BaseMachinePowered
  name: recycler
  description: A large crushing machine used to recycle small items inefficiently. There are lights on the side.
  components:
  - type: AmbientSound
    enabled: false
    volume: -8
    range: 5
    sound:
      # TODO: https://freesound.org/people/derjuli/sounds/448133/ CC-NC-
      path: /Audio/Ambience/Objects/circular_saw.ogg
  - type: Fixtures
    fixtures:
      brrt:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.15,-0.15,0.15,0.15"
        hard: false
        layer:
        - FullTileLayer
      collision:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        hard: true
        mask:
        - Impassable
        layer:
        - Opaque
        - BulletImpassable
      conveyor:
        shape: !type:PolygonShape
          vertices:
          - -0.55,-0.55
          - 0.55,-0.55
          - 0.55,0.55
          - -0.55,0.55
        layer:
        - Impassable
        - MidImpassable
        - LowImpassable
        hard: False
  - type: DeviceLinkSink
    ports:
      - Reverse
      - Forward
      - Off
  - type: Transform
    anchored: true
    noRot: false
  - type: Sprite
    drawdepth: Doors
    sprite: Structures/Machines/recycling.rsi
    layers:
    - state: grinder-o0
      map: ["enum.RecyclerVisualLayers.Main"]
  - type: Appearance
  - type: RecyclerVisuals
  - type: CollideMaterialReclaimer
  - type: MaterialReclaimer
    enabled: false
    scaleProcessSpeed: false #instant!
    minimumProcessDuration: 0
    whitelist:
      components:
      - PhysicalComposition
      - MobState
      - SpaceGarbage
      tags:
      - Trash
      - Recyclable
    blacklist:
      components:
      - Material
      - Pda
      - IdCard
      tags:
      - HighRiskItem
    sound:
      path: /Audio/Effects/saw.ogg
      params:
        volume: -3
    cutOffSound: false
  - type: MaterialStorage
    insertOnInteract: false
  - type: Conveyor
  - type: Rotatable
  - type: Repairable
    doAfterDelay: 5
    fuelCost: 25
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: ["Breakage"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: InteractionPopup
    successChance: 1.0
    interactSuccessString: petting-success-recycler
    interactFailureString: petting-failure-generic
    interactSuccessSound:
      path: /Audio/Items/drill_hit.ogg
  - type: SpookySpeaker
    speakChance: 0.1
    cooldown: 120
    messageSet: SpookySpeakerMessagesRecycler
  - type: Speech
    speechVerb: Robotic
    speechSounds: SyndieBorg

- type: entity
  id: IndustrialSmelter
  parent: BaseMachinePowered
  name: industrial smelter
  description: A massive stationary machine capable of chewing through flooring and walls. Must be powered to function.
  components:
  - type: Sprite
    drawdepth: Doors
    sprite: Structures/Machines/smelter.rsi
    layers:
    - state: smelter0
      map: ["enum.RecyclerVisualLayers.Main"]
    offset: 0, 0.5
  - type: Appearance
  - type: RecyclerVisuals
    baseKey: smelter
  - type: Conveyor
    angle: 90 # Conveyor goes sideways
  - type: DeviceLinkSink
    ports:
    - Reverse
    - Forward
    - Off
  - type: MaterialStorage
    insertOnInteract: false
  - type: CollideMaterialReclaimer
  - type: MaterialReclaimer
    enabled: false
    scaleProcessSpeed: false
    minimumProcessDuration: 0
    efficiency: 0.1
    blacklist: # TODO: This will need to be iterated on to properly balance all items
      components:
      - Material
      - Pda
      - IdCard
      - GrapplingProjectile
      tags:
      - HighRiskItem
      - SmeltingImmune
    sound:
      path: /Audio/Effects/saw.ogg
      params:
        volume: -3
    cutOffSound: false
  - type: TileReclaimer
    sound:
      path: /Audio/Effects/grind.ogg # TODO: Needs more CRONCH, more SMELT
      params:
        volume: -3
    recyclingBox: "-0.35, 0.5, 0.35, 0.75"
    blacklist:
      components:
      - StationMember
      - CargoShuttle
      - ArrivalsShuttle
      - EmergencyShuttle
  - type: Fixtures
    fixtures:
      brrt:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5, -0.15, 0.5, 1.5"
        hard: false
        layer:
        - FullTileLayer
        - DoorPassable # Here to hit floor objects like carpets etc.
        mask:
        - FullTileMask # Necessary for grilles.
        - TabletopMachineLayer # This is needed for lights.
      collision:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        hard: true
        mask:
        - Impassable
        layer:
        - Opaque
        - BulletImpassable
      conveyor:
        shape: !type:PolygonShape
          vertices:
          - -0.55,-0.55
          - 0.55,-0.55
          - 0.55,0.55
          - -0.55,0.55
        layer:
        - Impassable
        - MidImpassable
        - LowImpassable
        hard: False
  - type: AmbientSound
    enabled: false
    volume: -8
    range: 5
    sound:
      # TODO: https://freesound.org/people/derjuli/sounds/448133/ CC-NC-
      path: /Audio/Ambience/Objects/circular_saw.ogg
  - type: Transform
    anchored: true
    noRot: false
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: ["Breakage"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: Repairable
    doAfterDelay: 5
    fuelCost: 25
  - type: Tag
    tags:
    - EmagImmune
  - type: Speech
    speechVerb: Robotic
    speechSounds: SyndieBorg

- type: entity
  id: IndustrialSmelterAdmeme
  parent: IndustrialSmelter
  suffix: No Grid Whitelist, Admeme
  components:
  - type: TileReclaimer
    blacklist: null
