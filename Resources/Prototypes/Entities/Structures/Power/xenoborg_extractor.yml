- type: entity
  parent: [BaseMachine, BaseXenoborgContraband]
  id: XenoborgExtractor
  name: xenoborg extractor
  description: Drains electricity from the grid to produce xenoborg crystals via nuclear fusion.
  suffix: Unanchored
  placement:
    mode: PlaceFree
  components:
  - type: Physics
    bodyType: Dynamic
  - type: Transform
    anchored: false
  - type: AnchorOnlyOnStation
  - type: Sprite
    sprite: Structures/Machines/xenoborg_extractor.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["base"]
    - state: running
      map: ["running"]
    - state: light
      shader: unshaded
      map: ["light"]
  - type: Appearance
  - type: BatteryVisuals
  - type: GenericVisualizer
    visuals:
      enum.BatteryVisuals.Charging:
        base:
          Charging: { visible: false }
          Decharging: { visible: true }
          Constant: { visible: true }
        running:
          Charging: { visible: true }
          Decharging: { visible: false }
          Constant: { visible: false }
        light:
          Charging: { visible: true }
          Decharging: { visible: false }
          Constant: { visible: false }
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
      - !type:ExplodeBehavior
      - !type:SpawnEntitiesBehavior
        spawn:
          MachineFrameDestroyed:
            min: 1
            max: 1
      - !type:SpawnGasBehavior
        gasMixture:
          volume: 1000
          moles:
            CarbonDioxide: 340.5701689 # carbon dioxide
  - type: Explosive # small explosion when destroyed
    explosionType: Default
    maxIntensity: 20
    totalIntensity: 10
    intensitySlope: 5
    canCreateVacuum: false
  - type: LightningTarget
    priority: 1
  - type: Electrified
    onHandInteract: false
    onInteractUsing: false
    onBump: false
    requirePower: true
    highVoltageNode: input_hv
    mediumVoltageNode: input_mv
    lowVoltageNode: input_lv
  - type: Battery
    maxCharge: 4000000 # 4MJ
    netsync: false
  - type: ExaminableBattery
  - type: NodeContainer
    examinable: false # The PowerNetworkBatteryChargerVoltageToggler will show the current voltage
    nodes:
      input_lv:
        !type:CableDeviceNode
        nodeGroupID: Apc
      input_mv:
        !type:CableDeviceNode
        nodeGroupID: MVPower
      input_hv:
        !type:CableDeviceNode
        nodeGroupID: HVPower
  - type: BatteryCharger
    voltage: Apc
  - type: PowerNetworkBattery
    canDischarge: false
    maxChargeRate: 32000
  - type: PowerNetworkBatteryChargerVoltageToggler
    settings:
    - voltage: Apc
      wattage: 32000 # 32kW - 125 seconds to spawn one
      node: input_lv
      name: power-voltage-low
    - voltage: Medium
      wattage: 80000 # 80kW - 50 seconds to spawn one
      node: input_mv
      name: power-voltage-medium
    - voltage: High
      wattage: 200000 # 200kW - 20 seconds to spawn one # sets off the rogue power consuming device alert!
      node: input_hv
      name: power-voltage-high
  - type: SpawnOnBatteryLevel
    prototype: MaterialXenoborgCrystal1
    charge: 4000000 # 4MJ

- type: entity
  parent: XenoborgExtractor
  id: XenoborgExtractorAnchored
  suffix: Anchored
  placement:
    mode: SnapgridCenter
  components:
  - type: Physics
    bodyType: Static
  - type: Transform
    anchored: true
