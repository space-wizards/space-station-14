- type: entity
  parent: [BaseMachine, BaseXenoborgContraband]
  id: XenoborgExtractor
  name: xenoborg extractor
  description: Drains electricity from the grid to produce xenoborg crystals via nuclear fusion.
  suffix: Unanchored
  placement:
    mode: PlaceFree
  components:
  - type: Physics
    bodyType: Dynamic
  - type: Transform
    anchored: false
  - type: AnchorOnlyOnStation
  - type: Sprite
    sprite: Structures/Machines/xenoborg_extractor.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["base"]
    - state: running
      map: ["running"]
    - state: light
      shader: unshaded
      map: ["light"]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        base:
          True: { visible: false }
          False: { visible: true }
        running:
          True: { visible: true }
          False: { visible: false }
        light:
          True: { visible: true }
          False: { visible: false }
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
      - !type:ExplodeBehavior
      - !type:SpawnEntitiesBehavior
        spawn:
          MachineFrameDestroyed:
            min: 1
            max: 1
      - !type:SpawnGasBehavior
        gasMixture:
          volume: 1000
          moles:
            CarbonDioxide: 340.5701689 # carbon dioxide
  - type: Explosive # small explosion when destroyed
    explosionType: Default
    maxIntensity: 20
    totalIntensity: 10
    intensitySlope: 5
    canCreateVacuum: false
  - type: LightningTarget
    priority: 1
  - type: Electrified
    onHandInteract: false
    onInteractUsing: false
    onBump: false
    requirePower: true
    highVoltageNode: input_hv
    mediumVoltageNode: input_mv
    lowVoltageNode: input_lv
  - type: NodeContainer
    examinable: false # The VoltageToggler will show the current voltage
    nodes:
      input_lv:
        !type:CableDeviceNode
        nodeGroupID: Apc
        enabled: false
      input_mv:
        !type:CableDeviceNode
        nodeGroupID: MVPower
        enabled: false
      input_hv:
        !type:CableDeviceNode
        nodeGroupID: HVPower
        enabled: false
  - type: PowerConsumerBatteryCharger
  - type: PowerConsumer
    voltage: Apc
    drawRate: 15000
  - type: VoltageToggler
    settings:
    - voltage: Apc
      node: input_lv
      name: power-voltage-low
    - voltage: Medium
      node: input_mv
      name: power-voltage-medium
    - voltage: High
      node: input_hv
      name: power-voltage-high
  - type: DrawRateVoltageToggler
    drawRatePerVoltage:
      Apc: 15000 # 15kW - 60 seconds to spawn one
      Medium: 60000 # 60kW (30kW effectively) - 30 seconds to spawn one
      High: 270000 # 270kW (90kW effectively) - 10 seconds to spawn one # sets off the rogue power consuming device alert!
  - type: PowerConsumerBatteryChargerEfficiencyVoltageToggler
    efficiencyPerVoltage:
      Apc: 1 
      Medium: 0.5
      High: 0.33
  - type: Battery
    maxCharge: 900000 # 900KJ
    netsync: false
  - type: ExaminableBattery
  - type: SpawnOnBatteryLevel
    prototype: MaterialXenoborgCrystal1
    charge: 900000 # 4MJ

- type: entity
  parent: XenoborgExtractor
  id: XenoborgExtractorAnchored
  suffix: Anchored
  placement:
    mode: SnapgridCenter
  components:
  - type: Physics
    bodyType: Static
  - type: Transform
    anchored: true
