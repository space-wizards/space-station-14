- type: entity
  id: ThrusterWallmount
  parent: [BaseWallmount, BaseThruster ]
  name: wallmount thruster
  description: What is this? A thruster for ants?
  components:
  - type: Thruster
    thrust: 25 #1/4th regular thruster strength
  - type: WallMount
    arc: 360
    direction: 180
  - type: Sprite
    sprite: Structures/Shuttles/wallmount_thruster.rsi
    layers:
    - state: base
      map: ["enum.ThrusterVisualLayers.Base"]
    - state: thrust
      map: ["enum.ThrusterVisualLayers.ThrustOn"]
      shader: unshaded
      visible: false
    - state: thrust_burn_unshaded
      map: ["enum.ThrusterVisualLayers.ThrustingUnshaded"]
      shader: unshaded
      visible: false
      offset: 0, 1
    offset: 0, 0.125 #4 pixels
  - type: ApcPowerReceiver
    powerLoad: 500 #1/3 the power load of a normal thruster
  - type: Rotatable
  - type: Construction
    graph: WallmountThrusterGraph
    node: WallmountThrusterNode
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak

- type: entity
  id: BaseThrusterWallmountFrame
  parent: BaseWallmount
  categories: [ HideSpawnMenu ]
  name: wallmount thruster frame
  description: A wallmount thruster frame for construction.
  placement:
    mode: SnapgridCenter
  components:
  - type: Rotatable
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: Structures/Shuttles/wallmount_thruster.rsi
    layers:
    - state: frame
    offset: 0, 0.125 #4 pixels
  - type: Construction
    graph: WallmountThrusterGraph
    node: WallmountThrusterFrameNode
  - type: WallMount
    arc: 360
    direction: 180
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak

- type: entity
