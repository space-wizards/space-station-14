- type: entity
  id: GyroscopeFloor
  parent: [ BaseThruster, ConstructibleMachine ]
  name: subfloor gyroscope
  description: Slightly increases the shuttle's potential angular rotation. Can be hidden under floor tiles.
  components:
  - type: Thruster
    thrusterType: Angular
    requireSpace: false
    thrust: 200 #1/10th the strength of a normal gyroscope, because normal gyroscopes are very strong
    machinePartThrust: Manipulator
  - type: Sprite
    sprite: Structures/Shuttles/floor_gyroscope.rsi
    snapCardinals: true
    layers:
    - state: base
      map: ["enum.ThrusterVisualLayers.Base"]
    - state: thrust
      map: ["enum.ThrusterVisualLayers.ThrustOn"]
      shader: unshaded
      visible: false
    - state: thrust_burn
      map: [ "enum.ThrusterVisualLayers.Thrusting" ]
      visible: false
    - state: thrust_burn_unshaded
      map: ["enum.ThrusterVisualLayers.ThrustingUnshaded"]
      shader: unshaded
      visible: false
  - type: ApcPowerReceiver
    powerLoad: 500 #1/3 the power load of a regular gyroscope
  - type: Machine
    board: GyroscopeFloorMachineCircuitboard
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:ChangeConstructionNodeBehavior
        node: machineFrame
  - type: Damageable
    damageModifierSet: Electronic
  - type: Injurable
    damageContainer: StructuralInorganic
  - type: SubFloorHide
  - type: CollideOnAnchor
  - type: Transform
    anchored: false
  - type: BlockAnchorOn
    blacklist:
      components:
      - Thruster
  - type: Visibility
    layer: 1

- type: entity
  id: RustedThruster
  parent: BaseStructureDynamic
  name: rusted thruster
  description: An unrepairable thruster, broken down from wear and tear. Only useful for scrapping.
  components:
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.45,-0.45,0.45,0.45"
          density: 60
          mask:
          - MachineMask
          layer:
          - MachineLayer
    - type: Transform
      anchored: true
    - type: Physics
      bodyType: Static
    - type: Rotatable
      rotateWhileAnchored: true
    - type: Sprite
      sprite: Structures/Shuttles/old_thruster.rsi
      state: base
    - type: Damageable
      damageModifierSet: Electronic
    - type: Injurable
      damageContainer: Inorganic
    - type: Destructible
      thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 100  # Considering we need a lot of thrusters didn't want to make an individual one too tanky
        behaviors:
          - !type:DoActsBehavior
            acts: ["Destruction"]
          - !type:PlaySoundBehavior
            sound:
              collection: MetalBreak
    - type: PhysicalComposition
      materialComposition:
        Steel: 1200 # 12 sheets
