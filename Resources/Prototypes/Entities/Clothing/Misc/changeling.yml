# this file contains chameleon clothing for the changelings transformation ability
# one for each slot

- type: entity
  abstract: true
  parent: Clothing
  id : ChangelingFleshClothingBase
  suffix: Changeling
  components:
  - type: Clothing
    quickEquip: false
  - type: FleetingClothing
    removedSound:
      path: /Audio/Voice/Slime/slime_squish.ogg # TODO: replace placeholder
    playSoundOnSelfUnequip: false # silent if you remove it yourself
    selfUnquipPopupWearer: null
    selfUnquipPopupOthers: null
    removedPopup: changeling-flesh-clothing-removed-popop
    examineWearer: changeling-flesh-clothing-examine-wearer
    examineOthers: null # stealthy unless stripped
  - type: ChangelingFleshClothing
  - type: ChameleonClothing # has the component, but not the BUI, so that it cannot be set manually
    affectedByEmp: false
    canBeSetByController: false
    showVerb: false
  - type: FlavorProfile
    flavors:
    - meaty
  - type: Tag
    tags: [] # ignore "WhitelistChameleon" tag

- type: entity
  parent: ChangelingFleshClothingBase
  id: ChangelingFleshClothingBack
  name: changeling flesh backpack
  components:
  - type: Sprite
    sprite: Clothing/Back/Backpacks/backpack.rsi
    state: icon
  - type: Item
    size: Huge
  - type: Clothing
    slots:
    - back
  - type: ChameleonClothing
    default: ChangelingFleshClothingBack
    slot:
    - back
  # does not have storage, it's just a visual replacement for stealth purposes

- type: entity
  parent: ChangelingFleshClothingBase
  id: ChangelingFleshClothingBelt
