# Ears

- type: marking
  id: EarsShadowkin
  bodyPart: HeadTop
  groupWhitelist: [ Shadowkin ]
  forcedColoring: true
  sprites:
  - sprite: Mobs/Customization/Shadowkin/ears.rsi
    state: shadowkin

- type: marking
  id: EarsShadowkinStriped
  bodyPart: HeadTop
  groupWhitelist: [ Shadowkin ]
  coloring:
    default:
      type:
        !type:SkinColoring
    layers:
      shadowkin_stripes:
        type:
          !type:SimpleColoring
            color: "#FFFFFF"
  sprites:
  - sprite: Mobs/Customization/Shadowkin/ears.rsi
    state: shadowkin
  - sprite: Mobs/Customization/Shadowkin/ears.rsi
    state: shadowkin_stripes

