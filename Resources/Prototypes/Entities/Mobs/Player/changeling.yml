- type: entity
  parent: [ MobHuman, StorePresetChangeling ]
  id: MobLing
  name: Urist McLing
  suffix: Non-Antag
  components:
  - type: ChangelingDevour
  - type: ChangelingIdentity
  - type: ChangelingTransform
  - type: ActionGrant
    actions:
    - ActionChangelingStore
  - type: Store
    balance:
      ChangelingDNA: 60

- type: entity
  parent: [ SimpleSpaceMobBase ]
  id: MobHeadSlug
  name: headslug
  description: A small, slug-like creature with a large, gaping maw. It's covered in a thick, slimy mucus.
  components:
  - type: ChangelingSlug
  - type: Sprite
    drawdepth: SmallMobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: slug
      sprite: Mobs/Animals/headslug.rsi
  - type: DamageStateVisuals
    states:
      Alive:
        Base: slug
      Dead:
        Base: slug_dead
  - type: MobThresholds
    thresholds:
      0: Alive
      50: Dead
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 7
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 5
        Structural: 15 # to destroy lockers in which bodies could be hidden
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.2
        density: 15
        mask:
        - SmallMobMask
        layer:
        - SmallMobLayer
  - type: Tag # Removes DoorBumpOpener
    tags:
      []

- type: entity # dummy prototype for the store listing
  id: ChangelingFleshClothingAbilityStoreDummy
  categories: [ HideSpawnMenu ]
  components:
  - type: ChangelingFleshClothingAbility
    clothingPrototypes:
      shoes: ChangelingFleshClothingFeet
      jumpsuit: ChangelingFleshClothingInner
      outerClothing: ChangelingFleshClothingOuter
      gloves: ChangelingFleshClothingGloves
      neck: ChangelingFleshClothingNeck
      mask: ChangelingFleshClothingMask
      eyes: ChangelingFleshClothingEyes
      ears: ChangelingFleshClothingEars
      head: ChangelingFleshClothingHead
      suitstorage: ChangelingFleshClothingSuitStorage
      #id: TODO: chameleon PDA that is not a functional PDA
      belt: ChangelingFleshClothingBelt
      back: ChangelingFleshClothingBack

- type: entity # dummy prototype for the store listing
  id: ChangelingVoiceMimicDummy
  categories: [ HideSpawnMenu ]
  components:
  - type:  VoiceMask
    action: ActionChangelingVoiceMimic
    isInnate: true
    changeIDName: false
    # this is set to false as to not mess with a changeling's ability to disguise.
    accentHide: false
    titleText: changeling-voice-mimic-window-title
