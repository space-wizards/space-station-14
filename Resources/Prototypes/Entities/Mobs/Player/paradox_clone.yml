# Mob
- type: entity
  parent: BaseMob
  id: MobParadox
  name: space-time paradox
  description: A big ball of wibbly wobbly, timey wimey stuff.
  components:
  - type: Sprite
    drawdepth: Mobs
    layers:
    - sprite: Mobs/Aliens/paradox_clone.rsi
      state: paradox
      shader: unshaded
  - type: RotationVisuals
    horizontalRotation: 90
  - type: Pullable
  - type: Tag
    tags:
    - DoorBumpOpener

- type: entity
  parent: MobParadox
  id: MobParadoxTimed # visual effect when gibbing on round end
  components:
  - type: TimedDespawn
    lifetime: 10

# guidebook dummy

- type: entity
  id: ParadoxCloneDummy
  categories: [ HideSpawnMenu ]
  name: Paradox Clone
  components:
  - type: Sprite
    sprite: Mobs/Aliens/paradox_clone.rsi
    state: preview

# ghost
- type: entity
  parent:
  - Incorporeal
  - BaseMob
  id: MobParadoxCloneGhost
  name: space-time paradox
  description: This has something to do with trousers and with time. Probably.
  # categories: [ HideSpawnMenu, DoNotMap ]
  components:
  - type: Tag
    tags:
    - GhostOnlyWarp
  - type: Eye
    pvsScale: 1.5
    drawFov: false
    visMask: # need this to be able to see its own abilities
    - Normal
    - Ghost # Can see ghosts, but this shouldn't be a problem. I hope.
  - type: Visibility
    layer: 2
  - type: Sprite
    layers:
    - sprite: Mobs/Aliens/paradox_clone.rsi
      state: paradox
      shader: unshaded
  - type: ActionGrant
    actions:
    - ActionParadoxCloneMaterialize

- type: entity
  parent: BaseAction
  id: ActionParadoxCloneMaterialize
  name: Materialize
  description: Fully enter this dimension.
  components:
  - type: Action
    icon:
      sprite: Interface/Actions/carp_rift.rsi
      state: icon
    raiseOnUser: true
    raiseOnAction: false
    useDelay: 1
    priority: 3
  - type: InstantAction
    event: !type:ActionParadoxCloneMaterializeEvent
  - type: Visibility # needed so that the paradox clone can see it
    layer: 2
