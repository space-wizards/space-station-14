# Mob
- type: entity
  parent: BaseMob
  id: MobParadox
  name: space-time paradox
  description: A big ball of wibbly wobbly, timey wimey stuff.
  components:
  - type: Sprite
    drawdepth: Mobs
    layers:
    - sprite: Mobs/Aliens/paradox_clone.rsi
      state: paradox
      shader: unshaded
  - type: RotationVisuals
    horizontalRotation: 90
  - type: Pullable
  - type: Tag
    tags:
    - DoorBumpOpener

- type: entity
  parent: MobParadox
  id: MobParadoxTimed # visual effect when gibbing on round end
  components:
  - type: TimedDespawn
    lifetime: 10

# guidebook dummy

- type: entity
  id: ParadoxCloneDummy
  categories: [ HideSpawnMenu ]
  name: Paradox Clone
  components:
  - type: Sprite
    sprite: Mobs/Aliens/paradox_clone.rsi
    state: preview

# ghost
- type: entity
  parent:
  - Incorporeal
  - BaseMob
  id: MobParadoxCloneGhost
  name: space-time paradox
  description: This has something to do with trousers and with time. Probably.
  categories: [ HideSpawnMenu, DoNotMap ]
  components:
  # override incorporeal's
  - type: MovementSpeedModifier
    baseSprintSpeed: 6
    baseWalkSpeed: 4
  - type: Tag
    tags:
    - GhostOnlyWarp
  - type: IntrinsicRadioReceiver # it will be given an activeradio component by the paradoxclonerule system
  - type: Eye
    pvsScale: 1.5
    drawFov: true
    visMask: # need this to be able to see its own abilities
    - Normal
    - Ghost # Can see ghosts, but this shouldn't be a problem. I hope.
  - type: Visibility
    layer: 2
  - type: ActionGrant
    actions:
    - ActionParadoxCloneWander
  # these two components make it able to pass trough doors but not trough walls (like a rat)
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.3
        density: 230
        mask:
        - SmallMobMask
        layer:
        - SmallMobLayer
  - type: Sprite
    layers:
    - sprite: Mobs/Aliens/paradox_clone.rsi
      state: paradox
      shader: unshaded
    noRot: true

- type: entity
  parent: BaseAction
  id: ActionParadoxCloneMaterialize
  name: Materialize
  description: Fully enter this dimension.
  components:
  - type: Action
    icon:
      sprite: Mobs/Aliens/paradox_clone.rsi
      state: preview
    startDelay: true
    raiseOnUser: true
    raiseOnAction: false
    useDelay: 1 #15
    priority: 3
  - type: InstantAction
    event: !type:ActionParadoxCloneMaterializeEvent


- type: entity
  parent: BaseAction
  id: ActionParadoxCloneWander
  name: Choose spawn
  description: Look around for a spawning location.
  components:
  - type: Action
    icon:
      sprite: Mobs/Aliens/paradox_clone.rsi
      state: paradox # todo: make this unanimated
    raiseOnUser: true
    raiseOnAction: false
    startDelay: true
    useDelay: 1 #15
    priority: 3
  - type: InstantAction
    event: !type:ActionParadoxCloneWanderEvent

