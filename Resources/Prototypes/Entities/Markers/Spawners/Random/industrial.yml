#Industrial spawners
- type: entity
  name: industrial fluff spawner
  id: LootSpawnerIndustrialFluff
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Objects/Tools/flashlight.rsi
      state: flashlight
  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      - !type:GroupSelector
        weight: 9
        prob: 0.85
        children:
        - id: RemoteSignaller
        - id: GeigerCounter
        - id: trayScanner
        - id: FlashlightLantern
        - id: ClothingHandsGlovesColorBlack
        - id: Lighter
        - id: ClothingMaskGas
        - id: HandheldGPSBasic
      - !type:GroupSelector
        children:
        - id: CheapLighter
        - id: Pen
        - id: Cigar
        - id: CigarSpent
        - id: Cigarette
        - id: CigaretteSpent
        - id: Paper
        - id: FolderSpawner
    offset: 0.0

