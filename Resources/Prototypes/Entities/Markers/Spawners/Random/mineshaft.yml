- type: entity
  parent: MarkerBase
  id: RandomWoodenSupport
  name: wooden support spawner
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Objects/Decoration/mines.rsi
      state: support
  - type: EntityTableSpawner
    table: !type:GroupSelector
      prob: 0.9
      children:
      - id: WoodenSupport
      - id: WoodenSupportBeam
        weight: 3

- type: entity
  parent: MarkerBase
  id: RandomWoodenWall
  name: wooden wall spawner
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Objects/Decoration/mines.rsi
      state: support_wall
  - type: EntityTableSpawner
    table: !type:GroupSelector
      prob: 0.9
      children:
      - id: WoodenSupportWall
      - id: WoodenSupportWallBroken

- type: entity
  parent: MarkerBase
  id: RandomStalagmiteOrCrystal
  name: stalagmite or crystal spawner
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Objects/Decoration/Flora/flora_stalagmite.rsi
      state: stalagmite2
  - type: EntityTableSpawner
    table: !type:GroupSelector
      prob: 0.9
      children:
      - id: RandomBrownStalagmite
      - id: RandomGreyStalagmite
      - !type:NestedSelector
        tableId: RandomCrytsalTable
        prob: 0.7
    offset: 0.3

- type: entity
  parent: MarkerBase
  id: RandomBrownStalagmite
  name: brown stalagmite spawner
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Objects/Decoration/Flora/flora_stalagmite.rsi
      state: stalagmite2
  - type: EntityTableSpawner
    table:
      id: FloraStalagmite
      prob: 0.9
    offset: 0.3

- type: entity
  parent: MarkerBase
  id: RandomGreyStalagmite
  name: grey stalagmite spawner
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Objects/Decoration/Flora/flora_stalagmite.rsi
      state: grey_stalagmite3
  - type: EntityTableSpawner
    table:
      id: FloraGreyStalagmite
      prob: 0.9
    offset: 0.3
