- type: entity
  name: random altar spawner
  id: AltarSpawner
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Structures/Furniture/Altars/Gods/nanotrasen.rsi
      state: nanotrasen
  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      - id: AltarNanotrasen
      - id: AltarChaos
      - id: AltarDruid
      - id: AltarToolbox
      - id: AltarSpaceChristian
      - id: AltarSatana
      - id: AltarTechnology
    offset: 0.0

- type: entity
  name: random convert-altar spawner
  id: ConvertAltarSpawner
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Structures/Furniture/Altars/Gods/convertaltar.rsi
      state: convertaltar
  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      - id: AltarConvert
      - id: AltarConvertFestival
      - id: AltarConvertMaint
      - id: AltarConvertBlue
      - id: AltarConvertBurden
      - id: AltarConvertOrange
      - id: AltarConvertRed
      - id: AltarConvertWhite
      - id: AltarConvertYellow
    offset: 0.0

- type: entity
  name: random cult-altar spawner
  id: CultAltarSpawner
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Structures/Furniture/Altars/Cults/fangs.rsi
      state: full
  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      - id: AltarHeaven
      - id: AltarFangs
    offset: 0.0
