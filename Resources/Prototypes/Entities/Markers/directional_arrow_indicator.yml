- type: entity
  id: RedDirectionalArrowIndicator
  components:
  - type: Sprite
    sprite: Markers/directional_arrow_indicator.rsi
    color: "#FFFFFFBB"
    layers:
    - state: red_arrow
      offset: 0, 0
  - type: Tag
    tags:
    - HideContextMenu
 
- type: entity
  id: BlueDirectionalArrowIndicator
  categories: [ HideSpawnMenu ]
  components:
    - type: Sprite
      sprite: Markers/directional_arrow_indicator.rsi
      color: "#FFFFFFBB"
      layers:
        - state: blue_arrow
          offset: 0, 0
    - type: Tag
      tags:
        - HideContextMenu
