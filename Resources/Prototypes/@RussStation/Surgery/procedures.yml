# Surgery Procedures

- type: surgeryProcedure
  id: TendWoundsBrute
  name: surgery-procedure-tend-wounds-brute
  description: Repair physical damage through surgery.
  steps:
    - tag: Scalpel
      duration: 2.0
      popup: surgery-step-incision
      damage:
        types:
          Slash: 5
      bleedModifier: 3.0
    - tag: Retractor
      duration: 1.5
      popup: surgery-step-retract
      damage:
        types:
          Blunt: 2
    - tag: Hemostat
      duration: 2.0
      popup: surgery-step-treat-brute
      repeatable: true
      healingTotal: 10
      healing:
        types:
          Blunt: 1
          Slash: 1
          Piercing: 1
      bleedModifier: -1.0
    - tag: Cautery
      duration: 2.0
      popup: surgery-step-cauterize
      damage:
        types:
          Heat: 2

