- type: entity
  save: false
  parent: BaseSpeciesMobOrganic
  id: BaseMobDwarf
  abstract: true
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        # they r smaller
        density: 120
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Vocal
    sounds:
      Male: UnisexDwarf
      Female: FemaleDwarf
      Unsexed: UnisexDwarf
  - type: Speech
    speechSounds: Bass

  - type: HumanoidAppearance
    species: Dwarf
    hideLayersOnEquip:
    - Hair
    - Snout
    markingsDisplacement:
      Tail:
        sizeMaps:
          32:
            sprite: Mobs/Species/Dwarves/displacement.rsi
            state: tail
  - type: Inventory
    speciesId: dwarf
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Dwarves/displacement.rsi
            state: jumpsuit
      outerClothing:
        sizeMaps:
          32:
            sprite: Mobs/Species/Dwarves/displacement.rsi
            state: outerclothing
      shoes:
        sizeMaps:
          32:
            sprite: Mobs/Species/Dwarves/displacement.rsi
            state: shoes

- type: entity
  parent: BaseSpeciesDummy
  id: MobDwarfDummy
  categories: [ HideSpawnMenu ]
  components:
  - type: Inventory
    speciesId: dwarf
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Dwarves/displacement.rsi
            state: jumpsuit
      outerClothing:
        sizeMaps:
          32:
            sprite: Mobs/Species/Dwarves/displacement.rsi
            state: outerclothing
      shoes:
        sizeMaps:
          32:
            sprite: Mobs/Species/Dwarves/displacement.rsi
            state: shoes
