- type: entity
  parent:
  - AppearanceDwarf
  - MobHuman
  id: MobDwarf
  name: Urist McHands the Dwarf
  components:
  - type: Fixtures
    fixtures: # TODO: This needs a second fixture just for mob collisions.
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        # they r smaller
        density: 120
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Vocal
    sounds:
      Male: UnisexDwarf
      Female: FemaleDwarf
      Unsexed: UnisexDwarf
  - type: ReplacementAccent
    accent: scottish
  - type: Speech
    speechSounds: Bass
  - type: CreamPied
    displacement:
      sizeMaps:
        32:
          sprite: Mobs/Species/Human/displacement.rsi
          state: dwarfism
  - type: DamageVisuals
    displacement:
      sizeMaps:
        32:
          sprite: Mobs/Species/Human/displacement.rsi
          state: dwarfism
  - type: InnerBodyAnomalyVisuals
    displacement:
      sizeMaps:
        32:
          sprite: Mobs/Species/Human/displacement.rsi
          state: dwarfism

