- type: entity
  parent: BaseGameRule
  id: Thief
  components:
  - type: ThiefRule
  - type: AntagObjectives
    objectives:
    - EscapeThiefShuttleObjective
  - type: AntagRandomObjectives
    sets:
    - groups: ThiefBigObjectiveGroups
      prob: 0.7
      maxPicks: 1
    - groups: ThiefObjectiveGroups
      maxPicks: 10
    maxDifficulty: 2.5
  - type: AntagSelection
    agentName: thief-round-end-agent-name
    selectionTime: PrePlayerSpawn
    lateJoinAdditional: true
    antags:
    - !type:LinearAntagCount
      proto: Thief
      playerRatio: 20
      range:
        min: 1
        max: 3
  - type: DynamicRuleCost
    cost: 75
  - type: GameRule
    cancelPresetOnTooFewPlayers: false

# Needs testing
- type: entity
  parent: BaseWizardRule
  id: SubWizard
  components:
  - type: GameRule
    cancelPresetOnTooFewPlayers: false

- type: entity
  parent: BaseXenoborgsRule
  id: SubXenoborgs
  components:
  - type: GameRule
    minPlayers: 30
    cancelPresetOnTooFewPlayers: false
