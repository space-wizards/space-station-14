- type: entity
  abstract: true
  parent: BaseObjective
  id: BaseChangelingObjective
  components:
  - type: Objective
    issuer: Changeling
    difficulty: 1
  - type: RoleRequirement
    roles:
    - ChangelingRole

- type: entity
  parent: [BaseChangelingObjective, BaseSurviveObjective]
  id: ChangelingSurviveObjective
  name: Survive.
  description: We must stay alive at all cost.
  components:
  - type: Objective
    difficulty: 0.5
    icon:
      sprite: Mobs/Species/Human/organs.rsi
      state: heart-on

- type: entity
  parent: BaseChangelingObjective
  id: ChangelingUniqueIdentityObjective
  components:
  - type: Objective
    difficulty: 1
    icon:
      sprite: Mobs/Aliens/flesh.rsi
      state: golem
  - type: NumberObjective
    min: 3
    max: 4
    title: objective-unique-identity-name
    description: objective-unique-identity-description
  - type: ChangelingUniqueIdentityCondition

- type: entity
  parent: [BaseChangelingObjective, BaseLivingObjective]
  id: ChangelingEscapeIdentityObjective
  description: We must escape with the target person's identity and wear an ID card with their name on it.
  components:
  - type: Objective
    difficulty: 1.5
    icon:
      sprite: Objects/Fun/Plushies/human.rsi
      state: icon
  - type: TargetObjective
    title: objective-escape-identity-title
  - type: ChangelingEscapeIdentityCondition
  - type: PickRandomPerson
    filters:
    - !type:HasRoleMindFilter
      inverted: true # Do not roll changelings here. Their initial identity will be basically impossible to get after they transform.
      whitelist:
        components:
        - ChangelingRole

- type: entity
  parent: [BaseChangelingObjective, BaseLivingObjective]
  id: ChangelingEscapeDepartmentObjective
  description: We must escape with the identity & ID card of any member of this department.
  components:
  - type: Objective
    difficulty: 1
    icon:
      sprite: Objects/Fun/plushielizard_jobs.rsi
      state: captain
  - type: TargetObjective
    title: objective-escape-department-title
  - type: ChangelingEscapeDepartmentCondition
  - type: PickRandomPerson
    filters:
    - !type:HasRoleMindFilter
      inverted: true # Do not roll changelings here. It will cause problems with weird job mindroles as they transform n stuff.
      whitelist:
        components:
        - ChangelingRole
    - !type:HasRoleMindFilter
      whitelist:
        components:
        - JobRole # Our target has to be employed, obviously.
    - !type:DifferentDepartmentMindFilter # I love spawning as a scientist and having to escape as a scientist
