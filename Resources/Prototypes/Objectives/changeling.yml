- type: entity
  abstract: true
  parent: BaseObjective
  id: BaseChangelingObjective
  components:
  - type: Objective
    issuer: objective-issuer-changeling
    difficulty: 1
  - type: RoleRequirement
    roles:
    - ChangelingRole

- type: entity
  parent: [BaseChangelingObjective, BaseSurviveObjective]
  id: ChangelingSurviveObjective
  name: Survive.
  description: We must stay alive at all cost.
  components:
  - type: Objective
    difficulty: 1
    icon:
      sprite: Mobs/Species/Human/organs.rsi
      state: heart-on

- type: entity
  parent: BaseChangelingObjective
  id: ChangelingUniqueIdentityObjective
  components:
  - type: Objective
    difficulty: 1
    icon:
      sprite: Mobs/Aliens/flesh.rsi
      state: golem
  - type: NumberObjective
    min: 3
    max: 4
    title: objective-unique-identity-name
    description: objective-unique-identity-description
  - type: ChangelingUniqueIdentityCondition

- type: entity
  parent: BaseChangelingObjective
  id: ChangelingDevourMostObjective
  name: Devour the most unique humanoids out of all changelings.
  description: This is our hunting ground and we must prove as such.
  components:
  - type: Objective
    unique: false # We compare against other objectives. Can't do that if there is only one.
    difficulty: 1
    icon:
      sprite: Mobs/Aliens/flesh.rsi
      state: golem
  - type: ChangelingDevourMostCondition
