- type: entity
  parent: LootCrateBase
  id: LootCrateMedicalBasic
  name: medical loot crate
  suffix: Basic
  description: A large container that once contained lots of medical equipment. Used to be sterile, but the passage of time likely killed any hope of that off now. Maybe there's still some leftover medical supplies inside.
  components:
  - type: Sprite
    noRot: true
    sprite: Structures/Storage/Crates/medical.rsi
    layers:
    - state: base
    - state: closed
  - type: Icon
    sprite: Structures/Storage/Crates/medical.rsi
    state: icon
  - type: LootCrate
    commonLootTable: LootTableCommonMedicalBasic
    rareLootTable: LootTableRareMedicalBasic
    legendaryLootTable: LootTableLegendaryMedicalBasic

- type: entity
  parent: LootCrateBase
  id: LootCrateTrash
  name: trash loot cart
  description: A large container that once contained...Actually, no, still contains lots and lots of trash. There's barely anything of value in this. Good luck finding something useful.
  components:
  - type: Sprite
    noRot: true
    sprite: Structures/Storage/Crates/trashcart.rsi
    layers:
    - state: base
    - state: closed
  - type: Icon
    sprite: Structures/Storage/Crates/trashcart.rsi
    state: icon
  - type: LootCrate
    commonLootTable: LootTableCommonTrash
    rareLootTable: LootTableRareTrash
    legendaryLootTable: LootTableLegendaryTrash

