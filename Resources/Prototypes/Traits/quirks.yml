# If you add a new trait, make sure to add the corresponding component to the whitelist in \Resources\Prototypes\Entities\Mobs\Player\clone.yml so it gets copied to clones correctly!

- type: trait
  id: Pacifist
  name: trait-pacifist-name
  description: trait-pacifist-desc
  category: Quirks
  components:
  - type: Pacified

- type: trait
  id: LightweightDrunk
  name: trait-lightweight-name
  description: trait-lightweight-desc
  category: Quirks
  components:
  - type: LightweightDrunk
    boozeStrengthMultiplier: 2

- type: trait
  id: Snoring
  name: trait-snoring-name
  description: trait-snoring-desc
  category: Quirks
  components:
  - type: Snoring

- type: trait
  id: Dwarfism
  name: trait-dwarfism-name
  description: trait-dwarfism-desc
  category: Quirks
  whitelist:
    tags:
    - Human
  components:
  - type: Inventory
    newSpecies: Dwarf
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Dwarves/displacement.rsi
            state: jumpsuit
      outerClothing:
        sizeMaps:
          32:
            sprite: Mobs/Species/Dwarves/displacement.rsi
            state: outerclothing
      shoes:
        sizeMaps:
          32:
            sprite: Mobs/Species/Dwarves/displacement.rsi
            state: shoes
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 120
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
