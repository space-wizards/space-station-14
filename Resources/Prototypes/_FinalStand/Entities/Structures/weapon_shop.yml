- type: entity
  id: FSWeaponShopBase
  abstract: true
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        density: 100
        mask:
        - ItemMask
        layer:
        - WallLayer
  - type: ActivatableUI
    key: enum.FSShopWeaponUiKey.Key
  - type: UserInterface
    interfaces:
      enum.FSShopWeaponUiKey.Key:
        type: FSShopWeaponBoundUserInterface

- type: entity
  id: FSWeaponShopViper
  parent: FSWeaponShopBase
  name: Viper
  description: A Syndicate-modified 9mm pistol. Semi-auto and full-auto. Press E to purchase.
  components:
  - type: FSShopWeapon
    weaponProtoId: WeaponPistolViper
    price: 1000
    upgrades:
    - id: viper-hair-trigger
      name: Hair Trigger
      description: Lighter pull increases fire rate by 1.5/level.
      maxLevel: 5
      baseCost: 200
      type: FireRate
      valuePerLevel: 1.5
    - id: viper-extended-mag
      name: Extended Mag
      description: Spare high-cap magazine spawned on each purchase.
      maxLevel: 5
      baseCost: 150
      type: SpawnItem
      spawnProtoId: MagazinePistolHighCapacity
      spawnCountPerLevel: 1
    - id: viper-recoil-pad
      name: Recoil Pad
      description: Reduces max spread by 0.3° per level for tighter bursts.
      maxLevel: 5
      baseCost: 100
      type: AngleMax
      valuePerLevel: 0.3
  - type: Sprite
    sprite: Objects/Weapons/Guns/Pistols/viper.rsi
    state: base
    scale: 0.5, 0.5

- type: entity
  id: FSWeaponShopMateba
  parent: FSWeaponShopBase
  name: Mateba
  description: Nanotrasen Death Squad revolver. High fire rate, .45 magnum. Press E to purchase.
  components:
  - type: FSShopWeapon
    weaponProtoId: WeaponRevolverMateba
    price: 500
    upgrades:
    - id: mateba-hair-trigger
      name: Hair Trigger
      description: Tuned action increases fire rate by 0.5/level.
      maxLevel: 5
      baseCost: 200
      type: FireRate
      valuePerLevel: 0.5
    - id: mateba-moonclip
      name: Moon Clip
      description: 6 loose .45 Magnum rounds spawned on each purchase per level.
      maxLevel: 5
      baseCost: 100
      type: SpawnItem
      spawnProtoId: CartridgeMagnum
      spawnCountPerLevel: 6
    - id: mateba-steady-aim
      name: Steady Aim
      description: Reduces max spread by 0.3° per level for precise follow-up shots.
      maxLevel: 5
      baseCost: 100
      type: AngleMax
      valuePerLevel: 0.3
  - type: Sprite
    sprite: Objects/Weapons/Guns/Revolvers/mateba.rsi
    state: icon
    scale: 0.5, 0.5
