# Shared prying config for all wave enemies.
# pryPowered: can open powered airlocks, force: bypass bolted doors,
# speedModifier: 8.0 = ~0.6s pry so BreakOnMove rarely cancels it.
- type: entity
  id: FSMobXeno
  parent: MobXeno
  suffix: FinalStand
  components:
  - type: HTN
    rootTask:
      task: FinalStandEnemyCompound
  - type: Prying
    pryPowered: true
    force: true
    speedModifier: 8.0
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 235
        mask:
        - MobMask
        layer:
        - MobLayer

