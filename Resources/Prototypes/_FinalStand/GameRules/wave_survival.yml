- type: entity
  id: WaveSurvival
  parent: BaseGameRule
  components:
  - type: WaveGameRule
    prepDuration: 15
    maxCombatDuration: 1800
    spawnInterval: 2
    waveStartSound: !type:SoundPathSpecifier
      path: /Audio/_FinalStand/WaveEvents/wave_start.ogg
    waveEndSound: !type:SoundPathSpecifier
      path: /Audio/_FinalStand/WaveEvents/wave_end.ogg
    enemyConfigs:
    # Waves 1-4: basic xeno swarm
    - fromWave: 1
      toWave: 4
      enemyPool:
      - FSMobXenoDrone
      - FSMobXeno
      - FSMobXenoRunner
    # Waves 5-9: heavier xenos + space spiders
    - fromWave: 5
      toWave: 9
      enemyPool:
      - FSMobXenoDrone
      - FSMobXenoPraetorian
      - FSMobSpiderSpace
    # Waves 10+: humanoid soldiers + heavy xenos
    - fromWave: 10
      enemyPool:
      - FSMobXenoPraetorian
      - FSMobSyndicateFootsoldier
      - FSMobFleshJared
      - FSMobHivebotRanged
